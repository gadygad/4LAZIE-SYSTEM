<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENT NOTES HUB - Select Semester</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Premium Global CSS -->
    <link rel="stylesheet" th:href="@{/css/premium-theme.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

    <div class="hub-container">
        
        <!-- Header Level Name -->
        <div class="mb-5">
            <i class="bi bi-calendar-event fs-1 text-primary mb-3 d-inline-block" style="background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
            <h1 class="brand-font fw-bold fs-2 text-uppercase tracking-wider" th:text="'Level ' + ${selectedLevel}">Level 4</h1>
            <div class="text-secondary small mt-1">Select a semester to access ACADEMIC NOTES</div>
        </div>

        <!-- Semesters Selection List -->
        <div class="mb-5">
            <a th:href="@{'/notes?level=' + ${selectedLevel} + '&semester=1'}" class="semester-btn">
                <span><i class="bi bi-1-circle me-3 text-info"></i>Semester 1</span>
                <i class="bi bi-arrow-right-short"></i>
            </a>

            <a th:href="@{'/notes?level=' + ${selectedLevel} + '&semester=2'}" class="semester-btn">
                <span><i class="bi bi-2-circle me-3 text-warning"></i>Semester 2</span>
                <i class="bi bi-arrow-right-short"></i>
            </a>
        </div>

        <!-- Back Link -->
        <div class="border-top pt-4" style="border-color: rgba(255, 255, 255, 0.05) !important;">
            <a href="/" class="btn-back"><i class="bi bi-arrow-left me-1"></i>Back to Levels</a>
        </div>

    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
