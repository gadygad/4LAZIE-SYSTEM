# =====================
# SERVER
# =====================
server.port=${PORT:8080}

# =====================
# DATABASE - MySQL (Required)
# Kwa local development, tumia: application-local.properties
# =====================
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:4lazie_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQLUSER:4lazie_user}
spring.datasource.password=${MYSQLPASSWORD:4lazie_pass_2024}

# =====================
# JPA / HIBERNATE
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
# Zima open-in-view ili kuepuka queries wakati wa rendering
spring.jpa.open-in-view=false

# =====================
# THYMELEAF
# =====================
spring.thymeleaf.cache=true

# =====================
# H2 CONSOLE - IMEZIMWA (Hatari kwa production)
# =====================
spring.h2.console.enabled=false

