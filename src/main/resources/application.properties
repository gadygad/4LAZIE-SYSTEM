# =====================
# SERVER
# =====================
server.port=${PORT:8080}

# =====================
# DATABASE (Seamless Local & Railway Setup)
# =====================
# Railway: Weka SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD kwenye Variables
# Local: Itatumia H2 automatically kama fallback
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/school_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# =====================
# JPA / HIBERNATE
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=false

# =====================
# THYMELEAF
# =====================
spring.thymeleaf.cache=false

# =====================
# H2 CONSOLE (OPTIONAL)
# =====================
spring.h2.console.enabled=true

# =====================
# CLOUDINARY STORAGE
# =====================
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api_key=${CLOUDINARY_API_KEY:}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:}
