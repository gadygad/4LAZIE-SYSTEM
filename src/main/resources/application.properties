# ====================================================
# PRODUCTION CONFIGURATION (Railway Deployment)
# ====================================================

server.port=${PORT:8080}

# =====================
# DATABASE - MongoDB (Railway)
# =====================
spring.data.mongodb.uri=${MONGO_URL:${MONGODB_URI:mongodb://mongo:okOeKbLeGvqLhIvbSWnYbAbaKrqfPhvi@reseau.proxy.rlwy.net:45222/school_db?authSource=admin}}

# =====================
# THYMELEAF
# =====================
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML

# =====================
# LOGGING
# =====================
logging.level.org.springframework=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# =====================
# FILE UPLOAD LIMITS
# =====================
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# =====================
# ACTUATOR (Health checks for Railway)
# =====================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =====================
# CLOUDINARY STORAGE
# =====================
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api_key=${CLOUDINARY_API_KEY:}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:}

# =====================
# ADMIN CREDENTIALS (Environment variables)
# =====================
app.admin.email=${ADMIN_EMAIL:kilingepazasauti@gmail.com}
app.admin.password=${ADMIN_PASSWORD:Admin@4LAZIE_2024!}
app.admin2.email=${ADMIN2_EMAIL:kilingepazasauti@gmail.com}
app.student.email=${STUDENT_EMAIL:john@student.edu}
app.student.password=${STUDENT_PASSWORD:Student@4LAZIE_2024!}

# =====================
# ERROR HANDLING
# =====================
server.error.whitelabel.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

# =====================
# EMAIL SETTINGS (GMAIL SMTP)
# =====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# =====================
# GOOGLE LOGIN
# =====================
google.client.id=${GOOGLE_CLIENT_ID:}

# =====================
# VAPID Keys for Web Push Notifications
# =====================
vapid.public.key=${VAPID_PUBLIC_KEY:}
vapid.private.key=${VAPID_PRIVATE_KEY:}
vapid.subject=${VAPID_SUBJECT:}
