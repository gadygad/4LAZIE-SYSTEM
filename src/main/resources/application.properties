# =====================
# SERVER
# =====================
server.port=${PORT:8080}

# =====================
# DATABASE (Seamless Local & Railway Setup)
# =====================
# Inatumia H2 kwa Local Testing. Ikiwa Railway, itatumia MySQL ikipata hizi 'Environment Variables'
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/school_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# =====================
# JPA / HIBERNATE
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =====================
# THYMELEAF
# =====================
spring.thymeleaf.cache=false

# =====================
# H2 CONSOLE (OPTIONAL)
# =====================
spring.h2.console.enabled=true

# =====================
# CLOUDINARY STORAGE
# =====================
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api_key=${CLOUDINARY_API_KEY:}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:}
