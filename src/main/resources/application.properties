# ====================================================
# PRODUCTION CONFIGURATION (Railway Deployment)
# ====================================================

server.port=${PORT:8080}

# =====================
# DATABASE - MongoDB (Railway)
# =====================
spring.data.mongodb.uri=${MONGODB_URI}

# =====================
# THYMELEAF
# =====================
spring.thymeleaf.cache=true
spring.thymeleaf.mode=HTML

# =====================
# LOGGING
# =====================
logging.level.org.springframework=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# =====================
# FILE UPLOAD LIMITS
# =====================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# =====================
# ACTUATOR (Health checks for Railway)
# =====================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =====================
# CLOUDINARY STORAGE
# =====================
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# =====================
# ADMIN CREDENTIALS (Environment variables)
# =====================
app.admin.email=${ADMIN_EMAIL:admin@school.com}
app.admin.password=${ADMIN_PASSWORD:change_me_please_2024}
app.admin2.email=${ADMIN2_EMAIL:admin2@school.com}
app.student.email=${STUDENT_EMAIL:john@student.edu}
app.student.password=${STUDENT_PASSWORD:student_change_me_2024}

# =====================
# ERROR HANDLING
# =====================
server.error.whitelabel.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true
