# =====================
# SERVER
# =====================
server.port=${PORT:8080}

# =====================
# DATABASE (Seamless Local & Railway Setup)
# =====================
# Railway hutoa hizi variables moja kwa moja kutoka MySQL Plugin:
# MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
# Kwa Local, H2 itumike kama fallback
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQL_ROOT_PASSWORD:${MYSQLPASSWORD:}}

# =====================
# JPA / HIBERNATE
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# =====================
# THYMELEAF
# =====================
spring.thymeleaf.cache=false

# =====================
# H2 CONSOLE (OPTIONAL)
# =====================
spring.h2.console.enabled=true

# =====================
# CLOUDINARY STORAGE
# =====================
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api_key=${CLOUDINARY_API_KEY:}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:}
