# =====================
# SERVER
# =====================
server.port=${PORT:8080}

# =====================
# DATABASE (MySQL on Railway with H2 Local Fallback)
# =====================
# spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:school_db}
# spring.datasource.username=${MYSQLUSER:root}
# spring.datasource.password=${MYSQL_ROOT_PASSWORD:}
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# H2 File-Based Database for local testing (Data will persist across restarts)
spring.datasource.url=jdbc:h2:file:./data/school_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =====================
# JPA / HIBERNATE
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =====================
# THYMELEAF
# =====================
spring.thymeleaf.cache=false

# =====================
# H2 CONSOLE (OPTIONAL)
# =====================
spring.h2.console.enabled=true

# =====================
# CLOUDINARY STORAGE
# =====================
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api_key=${CLOUDINARY_API_KEY:}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:}
