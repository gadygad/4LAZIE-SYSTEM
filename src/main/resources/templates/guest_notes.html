<script>
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('smartSearchInput');
    const searchResults = document.getElementById('searchResults');
    let timeout = null;

    if(searchInput) {
        searchInput.addEventListener('input', function(e) {
            clearTimeout(timeout);
            const query = e.target.value.trim();
            
            if (query.length < 2) {
                searchResults.classList.add('d-none');
                return;
            }

            // Loading state
            searchResults.classList.remove('d-none');
            searchResults.innerHTML = '<div class="p-3 text-center text-muted"><div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>Searching...</div>';

            timeout = setTimeout(() => {
                fetch(`/api/search?q=${encodeURIComponent(query)}`)
                    .then(response => response.json())
                    .then(data => {
                        searchResults.innerHTML = '';
                        if (data.results && data.results.length > 0) {
                            const list = document.createElement('div');
                            list.className = 'list-group list-group-flush rounded-3';
                            
                            data.results.forEach(note => {
                                const a = document.createElement('a');
                                a.href = `/download/${note.id}`;
                                a.className = 'list-group-item list-group-item-action d-flex align-items-center p-3 border-bottom-0';
                                a.style.transition = 'background-color 0.2s';
                                
                                let icon = 'bi-file-earmark-text';
                                let iconColor = 'text-primary';
                                let bg = 'rgba(59, 130, 246, 0.1)';
                                
                                if (note.category === 'Past Paper') {
                                    icon = 'bi-file-earmark-pdf';
                                    iconColor = 'text-danger';
                                    bg = 'rgba(239, 68, 68, 0.1)';
                                } else if (note.category === 'Assignment') {
                                    icon = 'bi-journal-check';
                                    iconColor = 'text-success';
                                    bg = 'rgba(16, 185, 129, 0.1)';
                                }
                                
                                a.innerHTML = `
                                    <div class="icon-box me-3 d-flex align-items-center justify-content-center rounded-3" style="width: 36px; height: 36px; background: ${bg};">
                                        <i class="bi ${icon} ${iconColor} fs-6"></i>
                                    </div>
                                    <div class="flex-grow-1 overflow-hidden">
                                        <h6 class="mb-0 fw-bold text-truncate" style="font-size: 0.85rem; color: #1e293b;">${note.title}</h6>
                                        <small class="text-muted" style="font-size: 0.7rem; font-weight: 500;">Level ${note.levelNo} • ${note.category || 'Note'}</small>
                                    </div>
                                    <i class="bi bi-chevron-right text-muted" style="font-size: 0.8rem;"></i>
                                `;
                                list.appendChild(a);
                            });
                            
                            // View all results link
                            if(data.totalMatches > 5) {
                                const viewAll = document.createElement('a');
                                viewAll.href = `/notes?search=${encodeURIComponent(query)}`;
                                viewAll.className = 'list-group-item text-center text-primary fw-bold p-2';
                                viewAll.style.fontSize = '0.8rem';
                                viewAll.style.background = '#f8fafc';
                                viewAll.innerHTML = `View all ${data.totalMatches} results <i class="bi bi-arrow-right ms-1"></i>`;
                                list.appendChild(viewAll);
                            }
                            
                            searchResults.appendChild(list);
                        } else {
                            searchResults.innerHTML = '<div class="p-4 text-center text-muted"><i class="bi bi-emoji-frown fs-4 d-block mb-2 text-secondary"></i><span style="font-size: 0.85rem;">No results found for "'+query+'"</span></div>';
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching search results:', error);
                        searchResults.innerHTML = '<div class="p-3 text-center text-danger" style="font-size: 0.85rem;"><i class="bi bi-exclamation-circle me-1"></i>Error loading results</div>';
                    });
            }, 400); // 400ms debounce
        });
        
        // Ctrl+K Shortcut to focus search
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
            }
        });
    }

    // Smart Hide-on-Scroll Navbar
    let lastScrollTop = 0;
    const navbar = document.querySelector('.navbar-custom');
    
    if (navbar) {
        window.addEventListener('scroll', function() {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop && scrollTop > 100) {
                // Scroll Down
                navbar.classList.add('navbar-hidden');
                navbar.classList.remove('navbar-visible');
            } else {
                // Scroll Up
                navbar.classList.remove('navbar-hidden');
                navbar.classList.add('navbar-visible');
            }
            lastScrollTop = scrollTop <= 0 ? 0 : scrollTop; // For Mobile or negative scrolling
        }, { passive: true });
    }
});
</script>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const searchBtn = document.getElementById('notesSearchBtn');
        const resultsContainer = document.getElementById('notesResults');
        const programSelect = document.getElementById('notesProgram');
        const courseSelect = document.getElementById('notesCourse');
        const semesterSelect = document.getElementById('notesSemester');
        const levelSelect = document.getElementById('notesLevel');

        // Dynamically fetched courses from the database via Thymeleaf
        const dbCourses = /*[[${courses}]]*/ [];

        const sjuitDegreeCourses = dbCourses
            .filter(c => {
                const pt = (c.programType || '').toUpperCase();
                const n = (c.name || '').toUpperCase();
                return pt.includes('DEGREE') || pt.includes('BSC') || pt.includes('MD') || pt.includes('BACHELOR') || 
                       n.includes('BACHELOR') || n.includes('BSC ') || n.includes('DEGREE');
            })
            .map(c => ({ value: c.programType, text: c.name || c.programType }));

        const sjuitDiplomaCourses = dbCourses
            .filter(c => {
                const pt = (c.programType || '').toUpperCase();
                const n = (c.name || '').toUpperCase();
                return pt.includes('DIP') || n.includes('DIPLOMA');
            })
            .map(c => ({ value: c.programType, text: c.name || c.programType }));

        function updateCourses() {
            const isDegree = programSelect.value === 'DEGREE';
            
            // Handle NTA Level Dropdown Animation
            const levelContainer = document.getElementById('notesLevelContainer');
            if (!isDegree) {
                levelContainer.style.display = 'block';
                // Trigger reflow for animation
                void levelContainer.offsetWidth;
                levelContainer.style.opacity = '1';
                levelContainer.style.transform = 'translateY(0)';
            } else {
                levelContainer.style.opacity = '0';
                levelContainer.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    if (programSelect.value === 'DEGREE') {
                        levelContainer.style.display = 'none';
                    }
                }, 400);
            }

            const courses = isDegree ? sjuitDegreeCourses : sjuitDiplomaCourses;
            courseSelect.innerHTML = '';
            
            if (courses.length === 0) {
                courseSelect.innerHTML = `<option value="">No courses available</option>`;
                return;
            }
            
            courses.forEach(c => {
                const option = document.createElement('option');
                option.value = c.value;
                option.textContent = c.text;
                courseSelect.appendChild(option);
            });
        }

        programSelect.addEventListener('change', updateCourses);
        // Initialize on load
        if(dbCourses && dbCourses.length > 0) {
            updateCourses();
        } else {
            // Fallback hardcoded if no courses from DB
            sjuitDiplomaCourses.push({value: 'DIP_CSE', text: 'Diploma in Computer Science Engineering'});
            sjuitDegreeCourses.push({value: 'DEG_CS', text: 'Bachelor of Computer Science'});
            updateCourses();
        }

        searchBtn.addEventListener('click', function() {
            // Pulse animation on button
            this.style.animation = 'none';
            void this.offsetWidth; 
            this.style.animation = 'pulse-glow 1s cubic-bezier(0.4, 0, 0.6, 1)';
            this.innerHTML = '<i class="bi bi-arrow-repeat spin"></i> Fetching...';

            const category = 'NOTE';
            const program = courseSelect.value;
            const semester = semesterSelect.value;
            const level = programSelect.value === 'DIPLOMA' ? levelSelect.value : null;

            let url = `/api/notes/filter?category=${category}&program=${program}&semester=${semester}`;
            if (level) {
                url += `&level=${level}`;
            }

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    // Reset button
                    this.innerHTML = '<i class="bi bi-magic me-2"></i> Fetch Notes';
                    
                    resultsContainer.classList.remove('show');
                    
                    setTimeout(() => {
                        if(data.length === 0) {
                            resultsContainer.innerHTML = `
                                <div class="text-center empty-state-glass">
                                    <i class="bi bi-inboxes-fill empty-state-icon mb-2" style="color: #f59e0b;"></i>
                                    <h4 class="fw-bold mb-1" style="font-family: 'Outfit', sans-serif; color: #92400e; font-size: 1.25rem; letter-spacing: -0.5px;">No Results Found</h4>
                                    <p style="color: #d97706; font-weight: 500; font-size: 0.9rem; opacity: 0.8; margin: 0 auto; max-width: 220px; line-height: 1.4;">Looks like it's empty here! Try tweaking your filters.</p>
                                </div>
                            `;
                            resultsContainer.classList.add('show');
                            return;
                        }

                        // Group by Module Name
                        const grouped = data.reduce((acc, curr) => {
                            if (!acc[curr.moduleName]) {
                                acc[curr.moduleName] = [];
                            }
                            acc[curr.moduleName].push(curr);
                            return acc;
                        }, {});

                        let html = '<div class="accordion" id="notesAccordion">';
                        let index = 0;
                        for (const [moduleName, items] of Object.entries(grouped)) {
                            const delay = index * 0.1;
                            html += `
                                <div class="accordion-item stagger-item" style="animation-delay: ${delay}s">
                                    <h2 class="accordion-header" id="heading${index}">
                                        <button class="accordion-button ${index !== 0 ? 'collapsed' : ''}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${index}" aria-expanded="${index === 0 ? 'true' : 'false'}" aria-controls="collapse${index}">
                                            <i class="bi bi-journal-text me-3" style="color: #f59e0b; font-size: 1.2rem;"></i>
                                            ${moduleName}
                                        </button>
                                    </h2>
                                    <div id="collapse${index}" class="accordion-collapse collapse ${index === 0 ? 'show' : ''}" aria-labelledby="heading${index}" data-bs-parent="#notesAccordion">
                                        <div class="accordion-body">
                                            <div class="row g-3">
                            `;
                            
                            items.forEach(item => {
                                html += `
                                    <div class="col-12 col-md-6">
                                        <div class="p-3 rounded-4" style="background: white; border: 1px solid rgba(245, 158, 11, 0.15); box-shadow: 0 4px 15px rgba(0,0,0,0.02); transition: all 0.3s ease;">
                                            <div class="d-flex align-items-center mb-2">
                                                <div class="rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 44px; height: 44px; background: rgba(245, 158, 11, 0.1); flex-shrink: 0;">
                                                    <i class="bi bi-file-earmark-pdf-fill" style="color: #f59e0b; font-size: 1.2rem;"></i>
                                                </div>
                                                <div style="flex-grow: 1; overflow: hidden;">
                                                    <h6 class="mb-0 text-truncate fw-bold" style="color: #1e293b; font-size: 0.95rem; font-family: 'Outfit', sans-serif;">${item.title}</h6>
                                                    <small class="text-muted" style="font-size: 0.75rem;"><i class="bi bi-calendar-event me-1"></i> Year: ${item.year || 'N/A'}</small>
                                                </div>
                                            </div>
                                            <div class="d-flex flex-wrap gap-2 mt-3">
                                                <button data-bs-toggle="modal" data-bs-target="#premiumModal" class="paper-action-btn btn-read border-0">
                                                    <i class="bi bi-eye"></i> View
                                                </button>
                                                <button data-bs-toggle="modal" data-bs-target="#premiumModal" class="paper-action-btn btn-download border-1">
                                                    <i class="bi bi-download"></i> DL
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                `;
                            });

                            html += `
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                            index++;
                        }
                        html += '</div>';
                        
                        resultsContainer.innerHTML = html;
                        resultsContainer.classList.add('show');
                        
                        // Trigger stagger animation
                        const itemsList = resultsContainer.querySelectorAll('.stagger-item');
                        itemsList.forEach((el, i) => {
                            el.style.animation = 'none';
                            void el.offsetWidth; // trigger reflow
                            el.style.animation = `fadeInUp 0.5s ease forwards ${i * 0.1}s`;
                        });

                    }, 300);
                })
                .catch(err => {
                    console.error('Error fetching notes:', err);
                    this.innerHTML = '<i class="bi bi-magic me-2"></i> Fetch Notes';
                    resultsContainer.innerHTML = '<div class="alert alert-danger">Failed to fetch notes. Please try again.</div>';
                    resultsContainer.classList.add('show');
                });
        });
        
        // Add required CSS for animations dynamically if not present
        if (!document.getElementById('fetch-animations')) {
            const style = document.createElement('style');
            style.id = 'fetch-animations';
            style.innerHTML = `
                @keyframes pulse-glow {
                    0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); transform: scale(1); }
                    50% { box-shadow: 0 0 0 15px rgba(245, 158, 11, 0); transform: scale(1.02); }
                    100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); transform: scale(1); }
                }
                .spin { animation: spin 1s linear infinite; }
                @keyframes spin { 100% { transform: rotate(360deg); } }
                .stagger-item { opacity: 0; transform: translateY(20px); }
                @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
            `;
            document.head.appendChild(style);
        }
    });
</script>
</body>
</html>
