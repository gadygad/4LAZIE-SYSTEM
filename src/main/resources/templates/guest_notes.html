<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUEST VIEW - LEVEL NOTES</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Premium Global CSS -->
    <link rel="stylesheet" th:href="@{/css/premium-theme.css?v=2.4}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" th:href="@{/css/global-premium.css}">
</head>

<body>

    <nav class="navbar navbar-light premium-guest-navbar sticky-top py-2 border-0">
        <div class="container-fluid px-3 px-md-4 d-flex flex-wrap justify-content-between align-items-center gap-2 gap-md-0">
            
            <!-- Mobile Menu Toggle (Order 0) -->
            <div class="d-flex d-lg-none align-items-center order-0 me-2">
                <button class="btn btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar" style="font-size: 1.8rem; padding: 0; border: none; background: transparent; color: #0f172a;">
                    <i class="bi bi-list" style="color: #0f172a; -webkit-text-fill-color: #0f172a;"></i>
                </button>
            </div>

            <!-- Brand (Order 1) -->
            <a class="navbar-brand d-flex align-items-center m-0 order-1" href="index.html" th:href="@{/}" style="text-decoration: none;">
                <div class="d-flex align-items-center justify-content-center me-2 me-md-3" style="width: 32px; height: 32px; border-radius: 50%; background: #f8fafc; border: 1px solid #e2e8f0; transition: all 0.3s ease;" onmouseover="this.style.background='#eff6ff'; this.style.borderColor='#bfdbfe'; this.style.transform='translateX(-3px)';" onmouseout="this.style.background='#f8fafc'; this.style.borderColor='#e2e8f0'; this.style.transform='none';">
                    <i class="bi bi-arrow-left" style="font-size: 1rem; color: #3b82f6;"></i>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span style="font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.5rem; color: #0f172a; letter-spacing: -1px; line-height: 1;">4LAZIE</span>
                    <div class="d-none d-sm-flex align-items-center position-relative" style="padding: 4px 12px; border-radius: 50px; background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), rgba(168, 85, 247, 0.08)); border: 1px solid rgba(168, 85, 247, 0.3); box-shadow: 0 0 20px rgba(168, 85, 247, 0.15); overflow: hidden; cursor: pointer;">
                        <!-- Shimmer overlay -->
                        <div style="position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent); transform: skewX(-20deg); animation: shimmer-glow 3s infinite;"></div>
                        <span style="font-size: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; background: linear-gradient(to right, #2563eb, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center;">
                            SMART IN BRAIN
                        </span>
                    </div>
                </div>
            </a>
            
            <!-- Mobile Sign In (Order 2 on Mobile, Hidden on Desktop) -->
            <div class="d-flex d-md-none justify-content-end align-items-center order-2">
                <a th:href="@{/login}" class="btn fw-bold rounded-pill px-3 py-1 d-flex align-items-center gap-2 m-0" style="background: linear-gradient(135deg, #d4af37 0%, #b48608 100%); color: #fff; border: none; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); font-size: 0.85rem;">
                    <i class="bi bi-person-fill" style="font-size: 1rem; color: #fff;"></i> <span>Sign In</span>
                </a>
            </div>

            <!-- Search Bar (Order 3 on Mobile, Order 2 on Desktop) -->
            <div class="search-container position-relative mx-0 mx-md-3 order-3 order-md-2 mt-2 mt-md-0 w-100 mobile-premium-search" style="flex-grow: 1; max-width: 500px;">
                <i class="bi bi-search position-absolute text-muted" style="left: 18px; top: 50%; transform: translateY(-50%); font-size: 1rem; z-index: 5;"></i>
                <input type="text" id="smartSearchInput" autocomplete="off" class="form-control" placeholder="Search modules, notes, or past papers..." 
                       style="padding: 10px 16px 10px 45px; border-radius: 100px; border: 1px solid rgba(0,0,0,0.1); background: #ffffff; font-size: 0.95rem; font-weight: 500; transition: all 0.3s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);"
                       onfocus="this.style.boxShadow='0 0 0 4px rgba(59,130,246,0.1)'; this.style.borderColor='var(--primary)'; this.style.background='#fff';"
                       onblur="setTimeout(() => { document.getElementById('searchResults')?.classList.add('d-none'); }, 200); this.style.boxShadow='inset 0 2px 4px rgba(0,0,0,0.02)'; this.style.borderColor='rgba(0,0,0,0.1)'; this.style.background='#f8fafc';">
                
                <!-- Search Results Dropdown -->
                <div id="searchResults" class="position-absolute w-100 bg-white shadow-lg d-none" style="top: 100%; left: 0; z-index: 1050; margin-top: 8px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.05); max-height: 350px; overflow-y: auto;">
                    <!-- Results will be injected here via JS -->
                </div>
                
                <!-- Ctrl+K Shortcut Hint -->
                <div class="shortcut-hint d-none d-md-block">Ctrl + K</div>
            </div>

            <!-- Desktop Sign In (Hidden on Mobile, Order 3 on Desktop) -->
            <div class="d-none d-md-flex justify-content-end align-items-center order-md-3" style="width: auto;">
                <a th:href="@{/login}" class="btn fw-bold rounded-pill px-3 py-1 d-flex align-items-center gap-2 m-0" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: #fff; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: all 0.3s ease; font-size: 0.9rem;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 20px rgba(0,0,0,0.3)';" onmouseout="this.style.transform='none'; this.style.boxShadow='0 4px 15px rgba(0,0,0,0.2)';">
                    <i class="bi bi-person-fill" style="font-size: 1.1rem; color: #f59e0b;"></i> <span>Sign In</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="page-layout">
        <!-- Desktop Sidebar -->
        <div class="d-none d-lg-block h-100">
            <aside th:replace="~{fragments/sjuit_components :: sidebar}"></aside>
        </div>
        
        <!-- Mobile Sidebar (Offcanvas) -->
        <div class="offcanvas offcanvas-start d-lg-none p-0" tabindex="-1" id="mobileSidebar" style="width: 280px; background: #1c1f30; border: none;">
            <div class="offcanvas-header border-bottom" style="border-color: rgba(255,255,255,0.1) !important;">
                <h5 class="offcanvas-title text-white fw-bold" style="font-family: 'Outfit', sans-serif;">PROGRAMMES</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body p-0 overflow-hidden">
                <aside th:replace="~{fragments/sjuit_components :: sidebar}"></aside>
            </div>
        </div>
        
        <div class="main-content d-flex flex-column" style="min-height: 100vh; width: 100%;">

    <div class="flex-grow-1">
    <div class="container-fluid px-4 px-xl-5 my-4">
        <div class="row animate-fade-in" style="animation-delay: 0.1s;">
            <div class="col-md-7 col-xl-8">
                
                
    
                <!-- Open Notes Section (Premium Minimalist Layout) -->
                <div class="mb-4 mt-2" style="padding: 10px 0;">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <div class="d-flex align-items-center flex-wrap gap-2 gap-md-3">
                            <!-- Plain text with icon -->
                            <h2 class="fw-bold m-0 d-flex align-items-center gap-2" style="font-family: 'Outfit', sans-serif; color: #d97706; letter-spacing: -0.5px; text-transform: uppercase; font-size: 1.05rem; white-space: nowrap;">
                                <i class="bi bi-journal-text" style="font-size: 1.1rem;"></i>
                                <span th:text="${selectedProgram != null ? #strings.replace(selectedProgram, '_', ' ') : 'MODULES'}">MODULES</span>
                            </h2>
                            <div class="dropdown">
                                
                                <button class="btn dropdown-toggle d-flex align-items-center premium-level-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                    <i class="bi bi-mortarboard-fill me-2" style="font-size: 0.9rem;"></i> LEVEL <span class="ms-1 me-1" th:text="${selectedLevel != null ? selectedLevel : '4'}">4</span>
                                    <i class="bi bi-chevron-down dropdown-icon"></i>
                                </button>
                                <ul class="dropdown-menu premium-level-menu">
                                    <li>
                                        <a class="dropdown-item premium-level-item" th:href="@{'/guest-notes?program=' + ${selectedProgram != null ? selectedProgram : 'DIP_CSE'} + '&level=4&semester=' + ${selectedSemester != null ? selectedSemester : 1}}">
                                            <span>LEVEL 4</span> <i class="bi bi-check-circle-fill"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a class="dropdown-item premium-level-item" th:href="@{'/guest-notes?program=' + ${selectedProgram != null ? selectedProgram : 'DIP_CSE'} + '&level=5&semester=' + ${selectedSemester != null ? selectedSemester : 1}}">
                                            <span>LEVEL 5</span> <i class="bi bi-check-circle-fill"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a class="dropdown-item premium-level-item" th:href="@{'/guest-notes?program=' + ${selectedProgram != null ? selectedProgram : 'DIP_CSE'} + '&level=6&semester=' + ${selectedSemester != null ? selectedSemester : 1}}">
                                            <span>LEVEL 6</span> <i class="bi bi-check-circle-fill"></i>
                                        </a>
                                    </li>
                                </ul>
                            </div>
                            <span th:if="${selectedSemester != null}" style="color: #ffffff; font-weight: 700; font-size: 0.75rem; background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); padding: 4px 12px; border-radius: 50px; box-shadow: 0 2px 8px rgba(245, 158, 11, 0.25); white-space: nowrap;">SEM <span th:text="${selectedSemester}">1</span></span>
                        </div>
                        
                        <!-- Responsive Semester Switcher (Plain Text) -->
                        
                        <div class="semester-switcher d-flex gap-2 gap-md-4 mt-3 mt-md-0 mx-auto mx-md-0 w-100 justify-content-center justify-content-md-end" style="align-items: center; margin-left: auto !important;">
                            <a th:href="@{'/guest-notes?program=' + ${selectedProgram != null ? selectedProgram : 'DIP_CSE'} + '&level=' + ${selectedLevel != null ? selectedLevel : 4} + '&semester=1'}" 
                               class="premium-sem-link" th:classappend="${selectedSemester == 1} ? 'active' : ''">
                               Semester 1
                            </a>
                            <span style="color: rgba(0,0,0,0.1); font-size: 1.2rem; font-weight: 300;">|</span>
                            <a th:href="@{'/guest-notes?program=' + ${selectedProgram != null ? selectedProgram : 'DIP_CSE'} + '&level=' + ${selectedLevel != null ? selectedLevel : 4} + '&semester=2'}" 
                               class="premium-sem-link" th:classappend="${selectedSemester == 2} ? 'active' : ''">
                               Semester 2
                            </a>
                        </div>

                <!-- Premium Section Header for Modules -->
                <div class="mb-4 mt-3 d-flex align-items-center" style="animation: fadeIn 0.8s ease forwards;">
                    <div class="d-flex align-items-center" style="background: linear-gradient(to right, rgba(245, 158, 11, 0.08), transparent); padding: 6px 16px; border-radius: 50px; border-left: 3px solid #f59e0b;">
                        <i class="bi bi-stack me-2" style="color: #d97706; font-size: 0.9rem;"></i>
                        <h4 class="fw-bold mb-0 text-uppercase" style="font-family: 'Outfit', sans-serif; color: #92400e; letter-spacing: 2px; font-size: 0.8rem;">
                            MODULE NAMES
                        </h4>
                    </div>
                    <div class="flex-grow-1 ms-3" style="height: 1px; background: linear-gradient(to right, rgba(245, 158, 11, 0.2), transparent);"></div>
                </div>
 
                <!-- Empty State (General) -->
                <div th:if="${#maps.isEmpty(groupedNotes)}" class="d-flex align-items-center p-3 mb-5" style="background: rgba(245, 158, 11, 0.05); border-radius: 12px; border: 1px dashed rgba(245, 158, 11, 0.3); box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                    <div class="rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 32px; height: 32px; background: rgba(245, 158, 11, 0.1);">
                        <i class="bi bi-folder-x" style="color: #d97706; font-size: 1.25rem;"></i>
                    </div>
                    <div>
                        <h6 class="mb-1 fw-bold" style="color: #1e293b; font-size: 0.95rem; font-family: 'Outfit', sans-serif;">No Modules Uploaded Yet</h6>
                        <p class="mb-0" style="color: #475569; font-size: 0.85rem;">Study materials for this level and semester will appear here once uploaded.</p>
                    </div>
                </div>



                <!-- Dynamic Modules Section -->
                <div th:replace="~{fragments/sjuit_components :: notes_accordion}"></div>

            </div> <!-- Close col-md-7 -->

            <!-- RIGHT COLUMN: PREMIUM FEATURES & TRENDING NOTES -->
            <div class="col-md-5 col-xl-4 mt-5 mt-md-0 ps-md-4">
                <div class="sticky-top" style="top: 100px;">
                    <div th:replace="~{fragments/sjuit_components :: premium_sidebar}"></div>
                </div>
            </div>
        </div>
    </div>
    <!-- Shared FOOTER -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>

    </div><!-- end .main-content -->
    </div><!-- end .page-layout -->



<!-- Exclusive Modal Component (Placed here to avoid z-index trap) -->
<div th:replace="~{fragments/sjuit_components :: restricted_modal}"></div>
<div th:replace="~{fragments/sjuit_components :: preview_modal}"></div>

    <!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('smartSearchInput');
    const searchResults = document.getElementById('searchResults');
    let timeout = null;

    if(searchInput) {
        searchInput.addEventListener('input', function(e) {
            clearTimeout(timeout);
            const query = e.target.value.trim();
            
            if (query.length < 2) {
                searchResults.classList.add('d-none');
                return;
            }

            // Loading state
            searchResults.classList.remove('d-none');
            searchResults.innerHTML = '<div class="p-3 text-center text-muted"><div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>Searching...</div>';

            timeout = setTimeout(() => {
                fetch(`/api/search?q=${encodeURIComponent(query)}`)
                    .then(response => response.json())
                    .then(data => {
                        searchResults.innerHTML = '';
                        if (data.results && data.results.length > 0) {
                            const list = document.createElement('div');
                            list.className = 'list-group list-group-flush rounded-3';
                            
                            data.results.forEach(note => {
                                const a = document.createElement('a');
                                a.href = `/download/${note.id}`;
                                a.className = 'list-group-item list-group-item-action d-flex align-items-center p-3 border-bottom-0';
                                a.style.transition = 'background-color 0.2s';
                                
                                let icon = 'bi-file-earmark-text';
                                let iconColor = 'text-primary';
                                let bg = 'rgba(59, 130, 246, 0.1)';
                                
                                if (note.category === 'Past Paper') {
                                    icon = 'bi-file-earmark-pdf';
                                    iconColor = 'text-danger';
                                    bg = 'rgba(239, 68, 68, 0.1)';
                                } else if (note.category === 'Assignment') {
                                    icon = 'bi-journal-check';
                                    iconColor = 'text-success';
                                    bg = 'rgba(16, 185, 129, 0.1)';
                                }
                                
                                a.innerHTML = `
                                    <div class="icon-box me-3 d-flex align-items-center justify-content-center rounded-3" style="width: 36px; height: 36px; background: ${bg};">
                                        <i class="bi ${icon} ${iconColor} fs-6"></i>
                                    </div>
                                    <div class="flex-grow-1 overflow-hidden">
                                        <h6 class="mb-0 fw-bold text-truncate" style="font-size: 0.85rem; color: #1e293b;">${note.title}</h6>
                                        <small class="text-muted" style="font-size: 0.7rem; font-weight: 500;">Level ${note.levelNo} • ${note.category || 'Note'}</small>
                                    </div>
                                    <i class="bi bi-chevron-right text-muted" style="font-size: 0.8rem;"></i>
                                `;
                                list.appendChild(a);
                            });
                            
                            // View all results link
                            if(data.totalMatches > 5) {
                                const viewAll = document.createElement('a');
                                viewAll.href = `/notes?search=${encodeURIComponent(query)}`;
                                viewAll.className = 'list-group-item text-center text-primary fw-bold p-2';
                                viewAll.style.fontSize = '0.8rem';
                                viewAll.style.background = '#f8fafc';
                                viewAll.innerHTML = `View all ${data.totalMatches} results <i class="bi bi-arrow-right ms-1"></i>`;
                                list.appendChild(viewAll);
                            }
                            
                            searchResults.appendChild(list);
                        } else {
                            searchResults.innerHTML = '<div class="p-4 text-center text-muted"><i class="bi bi-emoji-frown fs-4 d-block mb-2 text-secondary"></i><span style="font-size: 0.85rem;">No results found for "'+query+'"</span></div>';
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching search results:', error);
                        searchResults.innerHTML = '<div class="p-3 text-center text-danger" style="font-size: 0.85rem;"><i class="bi bi-exclamation-circle me-1"></i>Error loading results</div>';
                    });
            }, 400); // 400ms debounce
        });
        
        // Ctrl+K Shortcut to focus search
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
            }
        });
    }

    // Smart Hide-on-Scroll Navbar
    let lastScrollTop = 0;
    const navbar = document.querySelector('.navbar-custom');
    
    if (navbar) {
        window.addEventListener('scroll', function() {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop && scrollTop > 100) {
                // Scroll Down
                navbar.classList.add('navbar-hidden');
                navbar.classList.remove('navbar-visible');
            } else {
                // Scroll Up
                navbar.classList.remove('navbar-hidden');
                navbar.classList.add('navbar-visible');
            }
            lastScrollTop = scrollTop <= 0 ? 0 : scrollTop; // For Mobile or negative scrolling
        }, { passive: true });
    }
});
</script>
</body>
</html>
