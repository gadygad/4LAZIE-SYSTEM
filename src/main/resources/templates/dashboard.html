<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dashboard - 4LAZIE</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Premium Global CSS -->
    <link rel="stylesheet" th:href="@{/css/premium-theme.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    

    <style>
        
    </style>
</head>

<body>

    <div class="page-layout">
        <aside th:replace="~{fragments/sjuit_components :: sidebar}"></aside>
        
        <div class="main-content">


    <!-- Header Navigation -->
    <nav class="navbar navbar-light navbar-custom sticky-top py-3" style="background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 1020;">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center" href="/" style="text-decoration: none;">
                <i class="bi bi-arrow-left fs-4 me-2 text-secondary"></i>
                <span class="fs-3 me-2" style="font-family: 'Outfit', sans-serif; font-weight: 900; letter-spacing: -1px; background: linear-gradient(135deg, #0f172a 0%, #2563eb 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; position: relative; z-index: 1;">4LAZIE</span>
                <div class="d-none d-sm-flex align-items-center position-relative" style="padding: 6px 16px; border-radius: 50px; background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), rgba(168, 85, 247, 0.08)); border: 1px solid rgba(168, 85, 247, 0.3); box-shadow: 0 0 20px rgba(168, 85, 247, 0.15); overflow: hidden; cursor: pointer;">
                    <!-- Shimmer overlay -->
                    <div style="position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent); transform: skewX(-20deg); animation: shimmer-glow 3s infinite;"></div>
                    <span style="font-size: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; background: linear-gradient(to right, #2563eb, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center;">
                        <i class="bi bi-lightning-charge-fill me-1" style="-webkit-text-fill-color: #f59e0b; font-size: 0.85rem; filter: drop-shadow(0 0 4px rgba(245,158,11,0.6));"></i> SMART IN BRAIN
                    </span>
                    <style>
                        @keyframes shimmer-glow {
                            0% { left: -100%; }
                            20% { left: 200%; }
                            100% { left: 200%; }
                        }
                    </style>
                </div>
            </a>
            
            <!-- Search Bar moved to navbar -->
            <div class="search-container position-relative mx-3 d-none d-md-block" style="flex-grow: 1; max-width: 450px;">
                <i class="bi bi-search position-absolute text-muted" style="left: 18px; top: 50%; transform: translateY(-50%); font-size: 1rem;"></i>
                <input type="text" class="form-control" placeholder="Search modules, notes, or past papers..." 
                       style="padding: 12px 20px 12px 50px; border-radius: 100px; border: 1px solid rgba(0,0,0,0.1); background: #ffffff; font-size: 0.95rem; font-weight: 500; transition: all 0.3s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);"
                       onfocus="this.style.boxShadow='0 0 0 4px rgba(59,130,246,0.1)'; this.style.borderColor='var(--primary)'; this.style.background='#fff';"
                       onblur="this.style.boxShadow='inset 0 2px 4px rgba(0,0,0,0.02)'; this.style.borderColor='rgba(0,0,0,0.1)'; this.style.background='#f8fafc';">
            </div>

            <div class="d-flex align-items-center">
                <a href="/login" class="btn btn-premium btn-sm rounded-pill px-4 py-2 fw-bold" style="font-size: 0.9rem;">Login</a>
            </div>
        </div>
    </nav>
    <hr style="margin: 0; border: none; height: 3px; background: linear-gradient(90deg, #2563eb, #8b5cf6, #ec4899); opacity: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.1);" />

    <div class="container my-5">
        <div class="row animate-fade-in" style="animation-delay: 0.1s;">
            <div class="col-lg-7">
                
                
    <style>
        .module-item {
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            background-color: transparent;
        }
        .module-item:hover {
            background-color: #ffffff;
        }
        .module-dropdown {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out, opacity 0.4s ease-in-out, margin 0.3s ease-in-out;
            padding-left: 3.5rem;
            padding-right: 1.5rem;
            margin-bottom: 0;
        }
        .module-item:hover .module-dropdown {
            max-height: 300px;
            opacity: 1;
            margin-bottom: 15px;
        }
        .dropdown-icon {
            transition: transform 0.3s ease;
        }
        .module-item:hover .dropdown-icon {
            transform: rotate(180deg);
        }
        .unit-item {
            padding: 8px 16px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid transparent;
            margin-bottom: 4px;
        }
        .unit-item:hover {
            background-color: #ffffff;
            border-color: var(--border-subtle);
            color: var(--primary);
            transform: translateX(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
    </style>
    <!-- Open Notes Section -->
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 mt-0 gap-3">
                    <div class="d-flex align-items-center p-2 rounded-4" style="background: #ffffff; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                        <div class="premium-icon-box me-3 d-flex align-items-center justify-content-center" style="width: 44px; height: 44px; min-width: 44px; background: linear-gradient(135deg, #f59e0b, #d97706); color: #ffffff; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.2); border-radius: 12px; font-size: 1.2rem;">
                            <i class="bi bi-journal-album"></i>
                        </div> 
                        <div>
                            <h2 class="fw-bold m-0 fs-6" style="font-family: 'Outfit', sans-serif; color: #1e293b; letter-spacing: 0.5px; text-transform: uppercase;">
                                <span th:text="${selectedProgram == 'DIP_IT' ? 'DIP IN IT' : (selectedProgram == 'DIP_CSE' ? 'DIP IN CSE' : (selectedProgram == 'DIP_CE' ? 'DIP IN CE' : (selectedProgram == 'DIP_ME' ? 'DIP IN ME' : 'MODULES')))}">MODULES</span> 
                            </h2>
                            <div class="mt-1" style="font-size: 0.75rem; font-family: 'Outfit', sans-serif; font-weight: 600;">
                                <span style="color: #64748b;">LEVEL <span th:text="${selectedLevel != null ? selectedLevel : '4'}">4</span></span>
                                <span th:if="${selectedSemester != null}" style="color: #cbd5e1; margin: 0 6px;">|</span>
                                <span th:if="${selectedSemester != null}" th:text="'SEMESTER ' + ${selectedSemester}" style="color: #f59e0b;">SEMESTER 1</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Semester Switcher Pills -->
                    <div class="semester-switcher" style="background: transparent; padding: 4px; display: inline-flex; gap: 10px;">
                        <a th:href="@{'/dashboard?program=' + ${selectedProgram != null ? selectedProgram : 'DIP_IT'} + '&level=' + ${selectedLevel != null ? selectedLevel : 4} + '&semester=1'}" 
                           class="btn btn-sm border-0" 
                           th:classappend="${selectedSemester == 1 ? 'premium-pill-active' : 'premium-pill-inactive'}"
                           style="border-radius: 50px; padding: 4px 16px; font-weight: 600; font-size: 0.75rem; transition: all 0.3s ease;">
                           Semester 1
                        </a>
                        <a th:href="@{'/dashboard?program=' + ${selectedProgram != null ? selectedProgram : 'DIP_IT'} + '&level=' + ${selectedLevel != null ? selectedLevel : 4} + '&semester=2'}" 
                           class="btn btn-sm border-0" 
                           th:classappend="${selectedSemester == 2 ? 'premium-pill-active' : 'premium-pill-inactive'}"
                           style="border-radius: 50px; padding: 4px 16px; font-weight: 600; font-size: 0.75rem; transition: all 0.3s ease;">
                           Semester 2
                        </a>
                    </div>
                </div>

                <!-- Dynamic Modules Section -->
                <div th:replace="~{fragments/sjuit_components :: notes_accordion}"></div>

            </div> <!-- Close col-lg-7 -->

            <!-- RIGHT: PREMIUM FEATURES -->
            <div class="col-lg-5 mt-5 mt-lg-0">
                <div class="sticky-top" style="top: 100px;">
                    <h3 class="section-title text-start mb-4" style="font-size: 1.5rem; color: #1e293b; font-family: 'Outfit', sans-serif; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; text-decoration: underline; text-underline-offset: 8px; text-decoration-thickness: 3px; text-decoration-color: rgba(0, 0, 0, 0.6);">YOUR PROFILE</h3>
                    
                    <div class="premium-card position-relative" style="background: linear-gradient(145deg, #f8fafc, #ffffff); border-radius: 20px; border: 1px solid rgba(37, 99, 235, 0.2); box-shadow: 0 15px 35px rgba(37, 99, 235, 0.05), inset 0 0 0 1px rgba(255,255,255,0.5); overflow: hidden;">
                        <div style="height: 4px; width: 100%; background: linear-gradient(90deg, #2563eb, #3b82f6);"></div>
                        
                        <div class="position-absolute" style="top: -50px; right: -50px; width: 150px; height: 150px; background: radial-gradient(circle, rgba(37,99,235,0.1) 0%, transparent 70%); border-radius: 50%; pointer-events: none;"></div>
                        
                        <div class="p-4 relative z-1 text-center">
                            <img th:if="${user.profilePicture}" th:src="@{'/uploads/' + ${user.profilePicture}}" alt="Avatar" class="rounded-circle mb-3" style="width:90px;height:90px;object-fit:cover; border: 4px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.1);" />
                            <img th:unless="${user.profilePicture}" src="https://ui-avatars.com/api/?name=Student&background=2563eb&color=fff" alt="Avatar" class="rounded-circle mb-3" style="width:90px;height:90px;object-fit:cover; border: 4px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.1);" />
                            
                            <h4 class="mb-1 fw-bold" style="font-family: 'Outfit', sans-serif; font-size: 1.3rem; color: #1e293b;" th:text="${user.name}">John Doe</h4>
                            <p class="mb-3 text-primary fw-semibold" style="font-size: 0.85rem;" th:text="${user.courseProgram != null ? user.courseProgram : 'Student'}">DIPLOMA IN IT</p>

                            <div class="d-flex justify-content-center gap-4 mb-4">
                                <div class="text-center">
                                    <h5 class="fw-bold text-dark mb-0 fs-5" th:text="${totalDownloads != null ? totalDownloads : '0'}">12</h5>
                                    <small class="text-muted fw-medium" style="font-size: 0.75rem;">Downloads</small>
                                </div>
                                <div style="width: 1px; background: rgba(0,0,0,0.1);"></div>
                                <div class="text-center">
                                    <h5 class="fw-bold text-dark mb-0 fs-5" th:text="${totalNotes != null ? totalNotes : '0'}">45</h5>
                                    <small class="text-muted fw-medium" style="font-size: 0.75rem;">Materials</small>
                                </div>
                            </div>

                            <div class="d-flex flex-column gap-2">
                                <a href="/profile" class="btn w-100 fw-bold d-flex align-items-center justify-content-center gap-2 position-relative overflow-hidden" 
                                   style="background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05)); border: 1px solid rgba(255,255,255,0.1); color: white; border: none; padding: 12px; border-radius: 12px; font-size: 0.9rem; font-family: 'Outfit', sans-serif; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); transition: all 0.3s ease;" 
                                   onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 12px 25px rgba(0, 0, 0, 0.6)';" 
                                   onmouseout="this.style.transform='none'; this.style.boxShadow='0 8px 20px rgba(0, 0, 0, 0.4)';">
                                    <i class="bi bi-person-fill"></i> View Full Profile
                                </a>
                                
                                <a href="/logout" class="btn w-100 fw-bold d-flex align-items-center justify-content-center gap-2" 
                                   style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; padding: 12px; border-radius: 12px; font-size: 0.9rem; font-family: 'Outfit', sans-serif; transition: all 0.3s ease;" 
                                   onmouseover="this.style.background='rgba(239, 68, 68, 0.2)'; this.style.transform='translateY(-2px)';" 
                                   onmouseout="this.style.background='rgba(239, 68, 68, 0.1)'; this.style.transform='none';">
                                    <i class="bi bi-box-arrow-right"></i> Logout
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

        </div>
    </div>

    
    </div>



</div>

    <!-- Shared Footer -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
