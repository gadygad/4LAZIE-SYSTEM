<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 4LAZIE Premium</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0; padding: 0; min-height: 100%;
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            overflow-x: hidden;
            overflow-y: auto;
        }
        
        /* Rich Gold Background for Maximum Glass Contrast */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            overflow: hidden; pointer-events: none;
        }
        
        .glow-orb {
            position: absolute; border-radius: 50%; filter: blur(90px);
            animation: pulseOrb 25s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Vibrant Amber/Gold Orbs */
        .orb-1 { width: 500px; height: 500px; background: rgba(245, 158, 11, 0.6); top: -100px; left: -100px; }
        .orb-2 { width: 600px; height: 600px; background: rgba(251, 191, 36, 0.5); bottom: -150px; right: -50px; animation-delay: -5s; }
        .orb-3 { width: 450px; height: 450px; background: rgba(217, 119, 6, 0.4); top: 20%; left: 30%; animation-delay: -10s; }
        
        @keyframes pulseOrb {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.1) translate(40px, -40px); }
            100% { transform: scale(0.9) translate(-40px, 40px); }
        }

        .auth-container {
            position: relative; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        
        /* PURE GLASS EFFECT (Kioo Halisi) */
        .premium-card {
            background: rgba(255, 255, 255, 0.1); /* Very low opacity for glass */
            backdrop-filter: blur(25px); /* Strong blur */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.9); /* Top reflection */
            border-left: 1px solid rgba(255, 255, 255, 0.9); /* Left reflection */
            border-radius: 24px; /* Even smaller radius */
            padding: 2rem 1.5rem; /* Reduced padding */
            width: 100%; max-width: 320px; /* Reduced card width */
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1), inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            margin: 40px auto; /* Allows for scrolling if screen is small */
        }

        /* Glassy Inputs */
        .premium-input {
            background: rgba(255, 255, 255, 0.3) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5) !important;
            border-top: 1px solid rgba(0, 0, 0, 0.05) !important;
            color: #0f172a !important;
            border-radius: 12px !important; /* Smaller radius */
            padding: 0.8rem 1rem !important; /* Smaller padding for inputs */
            font-size: 0.95rem !important; /* Slightly smaller text */
            font-weight: 500;
            transition: all 0.3s ease !important;
            width: 100%;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }
        .premium-input:focus {
            background: rgba(255, 255, 255, 0.6) !important;
            border-color: #f59e0b !important;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.2), inset 0 2px 4px rgba(0,0,0,0.02) !important;
            outline: none;
        }
        .premium-input::placeholder { color: rgba(15, 23, 42, 0.5) !important; font-weight: 400; }

        /* Solid Call to Action */
        .premium-btn {
            background: #0f172a;
            border: none; border-radius: 12px; padding: 0.9rem; width: 100%; /* Smaller btn */
            color: #fff; font-size: 1rem; font-weight: 700; letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .premium-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(15, 23, 42, 0.3);
            background: #1e293b;
        }

        /* Glassy Social Button */
        .social-btn {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 12px; padding: 0.9rem; width: 100%; /* Smaller social btn */
            color: #0f172a; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.95rem;
            transition: all 0.3s ease; text-decoration: none;
        }
        .social-btn:hover { 
            background: rgba(255, 255, 255, 0.7); 
            transform: translateY(-2px); 
        }

        /* Typography */
        .text-gradient {
            background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .text-dark-custom {
            color: #0f172a;
        }
        .text-muted-custom {
            color: rgba(15, 23, 42, 0.6);
        }
        
        .form-check-input {
            cursor: pointer;
            width: 18px; height: 18px;
            border: 1px solid rgba(15, 23, 42, 0.3);
            background: rgba(255,255,255,0.5);
        }
        .form-check-input:checked {
            background-color: #0f172a;
            border-color: #0f172a;
        }
    </style>
</head>
<body>
    <div class="bg-glow">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="auth-container">
        <div class="premium-card">
            
            <div class="text-center mb-4 pb-2">
                <a href="/" class="text-decoration-none d-inline-block mb-1">
                    <span class="text-gradient fw-bold" style="font-size: 2.5rem; letter-spacing: -1.8px;">4LAZIE</span>
                </a>
                <h4 class="fw-bold mb-1 mt-2 text-dark-custom" style="letter-spacing: -0.5px;">Welcome Back</h4>
                <p class="text-muted-custom" style="font-size: 0.85rem; font-weight: 500;">Enter your credentials to continue</p>
            </div>

            <!-- Alerts -->
            <div th:if="${param.registered}" class="alert d-flex align-items-center p-3 mb-4 rounded-4" style="background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: #065f46; font-size: 0.85rem; backdrop-filter: blur(5px);">
                <i class="bi bi-check-circle-fill fs-5 me-3"></i> <span>Registration successful! Please log in.</span>
            </div>
            <div th:if="${param.error}" class="alert d-flex align-items-center p-3 mb-4 rounded-4" style="background: rgba(225, 29, 72, 0.15); border: 1px solid rgba(225, 29, 72, 0.3); color: #9f1239; font-size: 0.85rem; backdrop-filter: blur(5px);">
                <i class="bi bi-exclamation-triangle-fill fs-5 me-3"></i> <span>Invalid email or password.</span>
            </div>
            <div th:if="${param.logout}" class="alert d-flex align-items-center p-3 mb-4 rounded-4" style="background: rgba(37, 99, 235, 0.15); border: 1px solid rgba(37, 99, 235, 0.3); color: #1e3a8a; font-size: 0.85rem; backdrop-filter: blur(5px);">
                <i class="bi bi-info-circle-fill fs-5 me-3"></i> <span>You have securely logged out.</span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <input type="email" name="email" class="premium-input shadow-none" placeholder="Email Address" required autocomplete="off">
                </div>
                
                <div class="mb-4">
                    <input type="password" name="password" class="premium-input shadow-none" placeholder="Password" required>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4 px-2">
                    <div class="form-check d-flex align-items-center gap-2 m-0 p-0">
                        <input class="form-check-input m-0" type="checkbox" name="remember" id="remember" />
                        <label class="form-check-label fw-medium text-muted-custom" for="remember" style="font-size: 0.85rem; cursor: pointer;">Keep me signed in</label>
                    </div>
                    <a href="#" class="text-decoration-none" style="font-size: 0.85rem; color: #b45309; font-weight: 700; transition: color 0.3s;" onmouseover="this.style.color='#d97706'" onmouseout="this.style.color='#b45309'">Forgot Password?</a>
                </div>

                <button type="submit" class="premium-btn mb-4">
                    Sign In Securely <i class="bi bi-arrow-right-short fs-4"></i>
                </button>
            </form>

            <div class="d-flex align-items-center mb-4">
                <hr class="flex-grow-1" style="border-color: rgba(15,23,42,0.1); margin: 0;">
                <span class="mx-3" style="color: rgba(15,23,42,0.4); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">Or continue with</span>
                <hr class="flex-grow-1" style="border-color: rgba(15,23,42,0.1); margin: 0;">
            </div>

            <a href="#" class="social-btn mb-4">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="22" height="22" alt="Google"> 
                Google Account
            </a>

            <div class="text-center pt-2" style="border-top: 1px solid rgba(15,23,42,0.05);">
                <span class="text-muted-custom" style="font-size: 0.95rem;">New to 4LAZIE?</span> 
                <a th:href="@{/register}" class="text-gradient fw-bold text-decoration-none ms-1" style="font-size: 0.95rem;">Create free account</a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
