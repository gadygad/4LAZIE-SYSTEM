<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 4LAZIE Premium</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" th:href="@{/css/global-premium.css}">
</head>
<body>
    <div class="bg-glow">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="auth-container">
        <div class="premium-card">
            
            <div class="text-center mb-4 pb-2">
                <a href="/" class="text-decoration-none d-inline-block mb-1">
                    <span class="text-gradient fw-bold" style="font-size: 2.5rem; letter-spacing: -1.8px;">4LAZIE</span>
                </a>
                <h4 class="fw-bold mb-1 mt-2 text-dark-custom" style="letter-spacing: -0.5px;">Welcome Back</h4>
                <p class="text-muted-custom" style="font-size: 0.85rem; font-weight: 500;">Enter your credentials to continue</p>
            </div>

            <!-- Alerts -->
            <div th:if="${param.registered}" class="alert d-flex align-items-center p-3 mb-4 rounded-4" style="background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: #065f46; font-size: 0.85rem; backdrop-filter: blur(5px);">
                <i class="bi bi-check-circle-fill fs-5 me-3"></i> <span>Registration successful! Please log in.</span>
            </div>
            <div th:if="${param.error}" class="alert d-flex align-items-center p-3 mb-4 rounded-4" style="background: rgba(225, 29, 72, 0.15); border: 1px solid rgba(225, 29, 72, 0.3); color: #9f1239; font-size: 0.85rem; backdrop-filter: blur(5px);">
                <i class="bi bi-exclamation-triangle-fill fs-5 me-3"></i> <span>Invalid email or password.</span>
            </div>
            <div th:if="${param.logout}" class="d-flex align-items-center p-2 px-3 mb-4 mx-auto rounded-pill" style="background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(217, 119, 6, 0.15)); border: 1px solid rgba(245, 158, 11, 0.3); color: #b45309; font-size: 0.85rem; font-weight: 600; backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.1); width: fit-content; text-shadow: 0 1px 1px rgba(255,255,255,0.5);">
                <div class="d-flex align-items-center justify-content-center rounded-circle me-2" style="width: 26px; height: 26px; background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(217, 119, 6, 0.3)); box-shadow: 0 2px 5px rgba(245, 158, 11, 0.2);">
                    <i class="bi bi-shield-lock-fill" style="color: #d97706; font-size: 0.95rem;"></i>
                </div>
                <span>You have securely logged out.</span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <input type="text" name="email" class="premium-input shadow-none" placeholder="Email or Username" required autocomplete="off">
                </div>
                
                <div class="mb-4 position-relative">
                    <input type="password" name="password" id="password-input" class="premium-input shadow-none" placeholder="Password" required style="padding-right: 40px;">
                    <i class="bi bi-eye position-absolute top-50 translate-middle-y" id="toggle-password" style="right: 15px; cursor: pointer; color: #64748b; font-size: 1.1rem; transition: color 0.2s;"></i>
                </div>

                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-4 px-2">
                    <div class="form-check d-flex align-items-center mb-3 mb-sm-0 m-0 p-0">
                        <input class="form-check-input m-0 me-2" type="checkbox" name="remember" id="remember" />
                        <label class="form-check-label fw-medium text-muted-custom" for="remember" style="font-size: 0.85rem; cursor: pointer;">Keep me signed in</label>
                    </div>
                    <a href="/forgot-password" class="text-decoration-none" style="font-size: 0.85rem; color: #b45309; font-weight: 700; transition: color 0.3s;" onmouseover="this.style.color='#d97706'" onmouseout="this.style.color='#b45309'">Forgot Password?</a>
                </div>

                <button type="submit" class="premium-btn mb-4">
                    Sign In <i class="bi bi-arrow-right-short fs-4"></i>
                </button>
            </form>

            <div class="d-flex align-items-center mb-4">
                <hr class="flex-grow-1" style="border-color: rgba(15,23,42,0.1); margin: 0;">
                <span class="mx-3" style="color: rgba(15,23,42,0.4); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">Or continue with</span>
                <hr class="flex-grow-1" style="border-color: rgba(15,23,42,0.1); margin: 0;">
            </div>

            <div class="d-flex justify-content-center mb-4">
                <div id="g_id_onload"
                     data-client_id="226739305071-2b7frq975mp822vaua8404aci2cej5ds.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-size="large"
                     data-theme="outline"
                     data-text="sign_in_with"
                     data-shape="rectangular"
                     data-logo_alignment="left">
                </div>
            </div>

            <!-- Hidden form to submit the token with CSRF protection -->
            <form id="google-login-form" th:action="@{/register/google}" method="post" style="display: none;">
                <input type="hidden" name="credential" id="google-credential">
            </form>

            <div class="text-center pt-2" style="border-top: 1px solid rgba(15,23,42,0.05);">
                <span class="text-muted-custom" style="font-size: 0.95rem;">New to 4LAZIE?</span> 
                <a th:href="@{/register}" class="text-gradient fw-bold text-decoration-none ms-1" style="font-size: 0.95rem;">Create free account</a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        function handleCredentialResponse(response) {
            document.getElementById('google-credential').value = response.credential;
            document.getElementById('google-login-form').submit();
        }
        
        document.getElementById('toggle-password').addEventListener('click', function (e) {
            const passwordInput = document.getElementById('password-input');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
            this.style.color = type === 'text' ? '#f59e0b' : '#64748b';
        });
    </script>
</body>
</html>
