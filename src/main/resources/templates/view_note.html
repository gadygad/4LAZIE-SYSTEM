<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${note.title} + ' - 4LAZIE Notes Viewer'">4LAZIE Viewer</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevent scrolling on the main window */
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a; /* Dark sleek background */
            color: #f8fafc;
        }

        /* Glassmorphism Top Navigation Bar */
        .viewer-navbar {
            height: 70px;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            padding: 0 32px;
            justify-content: space-between;
            z-index: 1000;
            position: relative;
        }

        /* Animated gradient shine on navbar */
        .viewer-navbar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.8), rgba(255, 255, 255, 0.8), rgba(245, 158, 11, 0.8), transparent);
            background-size: 200% auto;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        /* Back Button */
        .back-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 10px 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transform: translateX(-3px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Centered Title */
        .title-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        .note-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: #ffffff;
            font-size: 1.25rem;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 50vw;
            text-align: center;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Download Button */
        .download-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 10px 24px;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: 1px solid rgba(245, 158, 11, 0.5);
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.3), inset 0 1px 1px rgba(255,255,255,0.2);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(217, 119, 6, 0.5), inset 0 1px 1px rgba(255,255,255,0.3);
            color: #ffffff;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
        }

        /* Iframe Container */
        .iframe-container {
            height: calc(100vh - 70px);
            width: 100%;
            background-color: #e2e8f0; /* Default PDF viewer background usually looks best light/grey so the PDF pops */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Optional: A subtle glow around the iframe */
        .iframe-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 20px 40px rgba(15, 23, 42, 0.5);
            pointer-events: none;
            z-index: 10;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #e2e8f0;
        }

        @media (max-width: 768px) {
            .viewer-navbar {
                padding: 0 16px;
                height: 60px;
            }
            .iframe-container {
                height: calc(100vh - 60px);
            }
            .note-title {
                font-size: 1rem;
                max-width: 35vw;
            }
            .back-btn span {
                display: none;
            }
            .back-btn {
                padding: 8px 12px;
            }
            .download-btn span {
                display: none;
            }
            .download-btn {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Top Navigation -->
    <div class="viewer-navbar">
        <!-- Back Button -->
        <a href="javascript:history.back()" class="back-btn">
            <i class="bi bi-arrow-left"></i> <span>Go Back</span>
        </a>

        <!-- Document Title -->
        <div class="title-container" style="flex-direction: column; gap: 2px;">
            <h1 class="note-title m-0 d-flex align-items-center gap-2" style="font-size: 1.15rem;">
                <span th:if="${note.unitNumber != null}" style="color: #f59e0b; font-weight: 800; letter-spacing: 1px;">UNIT [[${note.unitNumber}]]:</span>
                <span class="text-uppercase" style="border-bottom: 2px solid rgba(245,158,11,0.4); padding-bottom: 2px; letter-spacing: 1px;" th:text="${note.moduleName != null ? note.moduleName : note.title}">MODULE NAME</span>
            </h1>
            <div style="color: #94a3b8; font-size: 0.75rem; letter-spacing: 0.5px; font-weight: 500; font-family: 'Plus Jakarta Sans', sans-serif;" th:text="${note.title}">Specific Note Title</div>
        </div>

        <!-- Download Button -->
        <a th:href="@{'/download/' + ${note.id}}" class="download-btn">
            <i class="bi bi-cloud-arrow-down-fill"></i> <span>Download File</span>
        </a>
    </div>

    <!-- PDF Viewer Iframe -->
    <div class="iframe-container">
        <!-- We point the src to the /stream endpoint -->
        <iframe th:src="@{'/stream/' + ${note.id}}" title="PDF Viewer"></iframe>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
