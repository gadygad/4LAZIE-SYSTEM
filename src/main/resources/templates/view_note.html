<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <!-- PWA Manifest & Theme Color -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="/images/logo.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${note.title} + ' - 4LAZIE Notes Viewer'">4LAZIE Viewer</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" th:href="@{/css/global-premium.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard-premium.css?v=5}">

    <link rel="stylesheet" th:href="@{/css/viewer.css}">
</head>
<body class="has-bottom-nav">

    <!-- Top Navigation -->
    <div class="viewer-navbar">
        <!-- Back Button -->
        <a href="javascript:history.back()" class="back-btn d-flex align-items-center justify-content-center" style="width: 36px; height: 36px; border-radius: 50%; background: rgba(245, 158, 11, 0.1); color: #f59e0b; text-decoration: none; flex-shrink: 0;">
            <i class="bi bi-arrow-left fs-5"></i>
            <span class="d-none d-md-inline ms-2 fw-bold">Back</span>
        </a>

        <!-- Document Title -->
        <div class="title-container d-flex flex-column align-items-center justify-content-center flex-grow-1 px-2 px-md-3" style="min-width: 0;">
            <h1 class="note-title m-0 d-flex align-items-center justify-content-center gap-1 w-100" style="font-size: 1rem; font-weight: 700;">
                <span th:if="${note.unitNumber != null}" style="color: #f59e0b; flex-shrink: 0;">UNIT [[${note.unitNumber}]]:</span>
                <span class="text-uppercase text-truncate" style="color: #1e293b; border-bottom: 2px solid rgba(245,158,11,0.4); padding-bottom: 2px; letter-spacing: 0.5px;" th:text="${note.moduleName != null ? note.moduleName : note.title}">MODULE</span>
            </h1>
            <div class="d-none d-md-block text-truncate w-100 text-center mt-1" style="color: #64748b; font-size: 0.75rem; font-weight: 500;" th:text="${note.title}">Specific Note Title</div>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex gap-2 align-items-center flex-shrink-0">
            <!-- Save/Bookmark Button -->
            <button th:if="${user != null}" class="save-btn d-flex align-items-center justify-content-center" th:data-id="${note.id}" th:classappend="${user.savedNotes != null && user.savedNotes.contains(note.id) ? 'saved' : ''}" onclick="toggleSaveNote(this, this.getAttribute('data-id'))" title="Save for later" style="width: 36px; height: 36px; border-radius: 50%; border: none; background: #f1f5f9; color: #64748b; transition: all 0.3s;">
                <i class="bi fs-5" th:classappend="${user.savedNotes != null && user.savedNotes.contains(note.id) ? 'bi-bookmark-fill text-success' : 'bi-bookmark'}"></i> 
            </button>
            
            <!-- Download Button -->
            <a th:href="@{'/download/' + ${note.id}}" class="d-flex align-items-center gap-1" style="padding: 6px 14px; font-size: 0.8rem; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border-radius: 30px; font-weight: 700; text-decoration: none; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3); transition: all 0.3s ease;">
                <i class="bi bi-download"></i> <span style="letter-spacing: 0.5px;">Download</span>
            </a>
        </div>
    </div>

    <!-- PDF Viewer Container -->
    <div class="pdf-container d-flex flex-column" style="flex-grow: 1; position: relative; background: #e2e8f0; overflow: hidden;">
        
        <!-- Floating Controls Bar -->
        <div class="floating-controls">
            <div class="page-indicator"><span id="page-num">1</span> <span style="color: #94a3b8; font-weight: 500; margin: 0 2px;">/</span> <span id="page-count">--</span></div>
            
            <div style="width: 1px; height: 20px; background: #cbd5e1; margin: 0 4px;" class="d-none d-md-block"></div>
            
            <button id="zoom-out" class="control-btn d-none d-md-flex" title="Zoom Out"><i class="bi bi-zoom-out"></i></button>
            <button id="zoom-in" class="control-btn d-none d-md-flex" title="Zoom In"><i class="bi bi-zoom-in"></i></button>
        </div>

        <!-- Canvas Area -->
        <div id="canvas-container" style="flex-grow: 1; overflow: auto; display: flex; justify-content: center; padding: 20px;">
            <canvas id="pdf-render" style="box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-radius: 8px;"></canvas>
        </div>

        <!-- Loading Spinner -->
        <div id="pdf-loader" class="position-absolute top-50 start-50 translate-middle d-flex flex-column align-items-center" style="z-index: 5;">
            <div class="spinner-border" style="width: 3rem; height: 3rem; color: #3b82f6;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 fw-bold" style="color: #64748b; font-size: 0.95rem; letter-spacing: 1px;">Loading PDF Engine...</p>
        </div>
        
        <!-- Error Message -->
        <div id="pdf-error" class="position-absolute top-50 start-50 translate-middle text-center" style="display: none; background: #fee2e2; padding: 20px; border-radius: 12px; border: 1px solid #fca5a5; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            <i class="bi bi-exclamation-triangle-fill fs-1 text-danger"></i>
            <h5 class="mt-2 text-danger fw-bold">Document Unavailable</h5>
            <p class="text-danger" style="font-size: 0.9rem; margin-bottom: 0;">The document file could not be loaded.<br>It may have been deleted or is not a valid PDF.</p>
        </div>
    </div>

    <!-- Include Footer -->
    <div style="border-top: 1px solid #e2e8f0; background: #ffffff;">
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script th:inline="javascript">
        window.documentUrl = /*[[${note.fileUrl}]]*/ '';
        window.documentFilename = /*[[${note.filename != null ? note.filename.toLowerCase() : ''}]]*/ '';
    </script>
    <script th:src="@{/js/viewer.js}"></script>

    <!-- Mobile Bottom Navigation -->
    <div th:replace="~{fragments/bottom_nav :: nav('notes')}"></div>


    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('PWA ServiceWorker registered with scope:', registration.scope);
                    })
                    .catch(err => {
                        console.error('PWA ServiceWorker registration failed:', err);
                    });
            });
        }
    </script>

</body>
</html>
