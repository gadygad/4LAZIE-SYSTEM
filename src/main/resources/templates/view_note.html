<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${note.title} + ' - 4LAZIE Notes Viewer'">4LAZIE Viewer</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" th:href="@{/css/global-premium.css}">

    <link rel="stylesheet" th:href="@{/css/viewer.css}">
</head>
<body>

    <!-- Top Navigation -->
    <div class="viewer-navbar">
        <!-- Back Button -->
        <a href="javascript:history.back()" class="back-btn">
            <span>Go Back</span>
        </a>

        <!-- Document Title -->
        <div class="title-container" style="flex-direction: column; gap: 2px;">
            <h1 class="note-title m-0 d-flex align-items-center gap-1 gap-md-2" style="font-size: 1.05rem;">
                <span th:if="${note.unitNumber != null}" style="color: #f59e0b; font-weight: 800; letter-spacing: 1px;">UNIT [[${note.unitNumber}]]:</span>
                <span class="text-uppercase text-truncate" style="border-bottom: 2px solid rgba(245,158,11,0.4); padding-bottom: 2px; letter-spacing: 1px; max-width: 150px; display: inline-block;" th:text="${note.moduleName != null ? note.moduleName : note.title}">MODULE</span>
            </h1>
            <div class="d-none d-md-block" style="color: #94a3b8; font-size: 0.75rem; letter-spacing: 0.5px; font-weight: 500; font-family: 'Plus Jakarta Sans', sans-serif;" th:text="${note.title}">Specific Note Title</div>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex gap-2 align-items-center">
            <!-- Save/Bookmark Button -->
            <button th:if="${user != null}" class="save-btn" th:data-id="${note.id}" th:classappend="${user.savedNotes != null && user.savedNotes.contains(note.id) ? 'saved' : ''}" onclick="toggleSaveNote(this, this.getAttribute('data-id'))" title="Save for later">
                <i class="bi" th:classappend="${user.savedNotes != null && user.savedNotes.contains(note.id) ? 'bi-bookmark-fill text-success' : 'bi-bookmark'}"></i> 
                <span class="d-none d-md-inline" th:text="${user.savedNotes != null && user.savedNotes.contains(note.id) ? 'Saved' : 'Save'}">Save</span>
            </button>
            
            <!-- Download Button -->
            <a th:href="@{'/download/' + ${note.id}}" class="download-btn d-flex align-items-center gap-1" style="padding: 6px 12px; font-size: 0.85rem; background: linear-gradient(135deg, #10b981, #059669); color: white; border-radius: 20px; font-weight: 600; text-decoration: none;">
                <i class="bi bi-cloud-arrow-down-fill"></i> <span>Download</span>
            </a>
        </div>
    </div>

    <!-- PDF Viewer Container -->
    <div class="pdf-container d-flex flex-column" style="flex-grow: 1; position: relative; background: #e2e8f0; overflow: hidden;">
        
        <!-- Floating Controls Bar -->
        <div class="floating-controls">
            <div class="page-indicator"><span id="page-num">1</span> <span style="color: #94a3b8; font-weight: 500; margin: 0 2px;">/</span> <span id="page-count">--</span></div>
            
            <div style="width: 1px; height: 20px; background: #cbd5e1; margin: 0 4px;" class="d-none d-md-block"></div>
            
            <button id="zoom-out" class="control-btn d-none d-md-flex" title="Zoom Out"><i class="bi bi-zoom-out"></i></button>
            <button id="zoom-in" class="control-btn d-none d-md-flex" title="Zoom In"><i class="bi bi-zoom-in"></i></button>
        </div>

        <!-- Canvas Area -->
        <div id="canvas-container" style="flex-grow: 1; overflow: auto; display: flex; justify-content: center; padding: 20px;">
            <canvas id="pdf-render" style="box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-radius: 8px;"></canvas>
        </div>

        <!-- Loading Spinner -->
        <div id="pdf-loader" class="position-absolute top-50 start-50 translate-middle d-flex flex-column align-items-center" style="z-index: 5;">
            <div class="spinner-border" style="width: 3rem; height: 3rem; color: #3b82f6;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 fw-bold" style="color: #64748b; font-size: 0.95rem; letter-spacing: 1px;">Loading PDF Engine...</p>
        </div>
        
        <!-- Error Message -->
        <div id="pdf-error" class="position-absolute top-50 start-50 translate-middle text-center" style="display: none; background: #fee2e2; padding: 20px; border-radius: 12px; border: 1px solid #fca5a5; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            <i class="bi bi-exclamation-triangle-fill fs-1 text-danger"></i>
            <h5 class="mt-2 text-danger fw-bold">Document Unavailable</h5>
            <p class="text-danger" style="font-size: 0.9rem; margin-bottom: 0;">The document file could not be loaded.<br>It may have been deleted or is not a valid PDF.</p>
        </div>
    </div>

    <!-- Include Footer -->
    <div style="border-top: 1px solid #e2e8f0; background: #ffffff;">
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script th:inline="javascript">
        window.documentUrl = /*[[${note.fileUrl}]]*/ '';
        window.documentFilename = /*[[${note.filename != null ? note.filename.toLowerCase() : ''}]]*/ '';
    </script>
    <script th:src="@{/js/viewer.js}"></script>

    <!-- Mobile Bottom Navigation -->
    <div th:replace="~{fragments/bottom_nav :: nav('notes')}"></div>

</body>
</html>
