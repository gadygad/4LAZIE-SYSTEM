<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${note.title} + ' - 4LAZIE Notes Viewer'">4LAZIE Viewer</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" th:href="@{/css/global-premium.css}">
</head>
<body>

    <!-- Top Navigation -->
    <div class="viewer-navbar">
        <!-- Back Button -->
        <a href="javascript:history.back()" class="back-btn">
            <i class="bi bi-arrow-left"></i> <span>Go Back</span>
        </a>

        <!-- Document Title -->
        <div class="title-container" style="flex-direction: column; gap: 2px;">
            <h1 class="note-title m-0 d-flex align-items-center gap-2" style="font-size: 1.15rem;">
                <span th:if="${note.unitNumber != null}" style="color: #f59e0b; font-weight: 800; letter-spacing: 1px;">UNIT [[${note.unitNumber}]]:</span>
                <span class="text-uppercase" style="border-bottom: 2px solid rgba(245,158,11,0.4); padding-bottom: 2px; letter-spacing: 1px;" th:text="${note.moduleName != null ? note.moduleName : note.title}">MODULE NAME</span>
            </h1>
            <div style="color: #94a3b8; font-size: 0.75rem; letter-spacing: 0.5px; font-weight: 500; font-family: 'Plus Jakarta Sans', sans-serif;" th:text="${note.title}">Specific Note Title</div>
        </div>

        <!-- Download Button -->
        <a th:href="@{'/download/' + ${note.id}}" class="download-btn">
            <i class="bi bi-cloud-arrow-down-fill"></i> <span>Download File</span>
        </a>
    </div>

    <!-- PDF Viewer Iframe -->
    <div class="iframe-container">
        <!-- Loading Spinner -->
        <div id="iframe-loader" class="position-absolute top-50 start-50 translate-middle d-flex flex-column align-items-center" style="z-index: 5;">
            <div class="spinner-border" style="width: 3rem; height: 3rem; color: #3b82f6;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 fw-bold" style="color: #64748b; font-size: 0.95rem; letter-spacing: 1px;">Loading Document...</p>
        </div>
        
        <!-- We point the src to the /stream endpoint -->
        <iframe id="document-iframe" th:src="@{'/stream/' + ${note.id}}" title="PDF Viewer" onload="document.getElementById('iframe-loader').style.display='none';" style="position: relative; z-index: 10;"></iframe>
    </div>

    <!-- Include Footer -->
    <div style="border-top: 1px solid #e2e8f0; background: #ffffff;">
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
