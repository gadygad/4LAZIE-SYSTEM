<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - 4LAZIE Premium</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" th:href="@{/css/global-premium.css}">
</head>
<body>
    <div class="bg-glow">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="auth-container">
        <div class="premium-card">
            
            <div class="text-center mb-4 pb-2">
                <a href="/" class="text-decoration-none d-inline-block mb-1">
                    <span class="text-gradient fw-bold" style="font-size: 2.5rem; letter-spacing: -1.8px;">4LAZIE</span>
                </a>
                <h4 class="fw-bold mb-1 mt-2 text-dark-custom" style="letter-spacing: -0.5px;">Reset Password</h4>
                <p class="text-muted-custom" style="font-size: 0.85rem; font-weight: 500;">Chagua njia ya kupokea link ya kubadili password</p>
            </div>

            <!-- Alerts -->
            <div th:if="${error}" class="alert d-flex align-items-center p-3 mb-4 rounded-4" style="background: rgba(225, 29, 72, 0.15); border: 1px solid rgba(225, 29, 72, 0.3); color: #9f1239; font-size: 0.85rem; backdrop-filter: blur(5px);">
                <i class="bi bi-exclamation-triangle-fill fs-5 me-3"></i> <span th:text="${error}"></span>
            </div>

            <form th:action="@{/forgot-password}" method="post">
                <div class="mb-3">
                    <label class="form-label text-muted-custom fw-semibold mb-2" style="font-size: 0.85rem;">Njia ya Kutuma Ujumbe</label>
                    <select name="contactMethod" id="contactMethod" class="premium-input form-select shadow-none mb-3" required onchange="updateInputPlaceholder()">
                        <option value="email">Barua Pepe (Email)</option>
                        <option value="phone">Namba ya Simu (SMS)</option>
                    </select>
                </div>
                
                <div class="mb-4">
                    <input type="text" name="contactValue" id="contactValue" class="premium-input shadow-none" placeholder="Weka Email yako" required autocomplete="off">
                </div>

                <button type="submit" class="premium-btn mb-4">
                    Tuma Ujumbe <i class="bi bi-send-fill ms-2"></i>
                </button>
            </form>

            <div class="text-center pt-2" style="border-top: 1px solid rgba(15,23,42,0.05);">
                <span class="text-muted-custom" style="font-size: 0.95rem;">Umekumbuka password?</span> 
                <a th:href="@{/login}" class="text-gradient fw-bold text-decoration-none ms-1" style="font-size: 0.95rem;">Rudi kwenye Login</a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateInputPlaceholder() {
            var method = document.getElementById("contactMethod").value;
            var input = document.getElementById("contactValue");
            if (method === "email") {
                input.placeholder = "Weka Email yako";
                input.type = "email";
            } else {
                input.placeholder = "Weka Namba ya Simu (mf. 07XXXXXXXX)";
                input.type = "text";
            }
        }
    </script>
</body>
</html>
