<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock Premium - 4LAZIE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/premium-theme.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body class="bg-light">

    <!-- Header Navbar -->
    <nav class="navbar navbar-dark navbar-custom sticky-top py-1">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <span class="brand-font fs-3 fw-bold"><i class="bi bi-journal-text text-dark me-2"></i>4LAZIE</span>
            </a>
            <div th:replace="~{fragments/navbar_actions :: actions}"></div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8 text-center">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden" style="background: #ffffff;">
                    <div class="card-header border-0 py-4" style="background: var(--accent-gradient);">
                        <h2 class="fw-bold text-white mb-0" style="font-family: 'Outfit', sans-serif;"><i class="bi bi-star-fill text-warning me-2"></i>Premium Access Required</h2>
                    </div>
                    <div class="card-body p-5">
                        <div class="mb-4">
                            <i class="bi bi-lock-fill text-secondary" style="font-size: 4rem; opacity: 0.5;"></i>
                        </div>
                        <h4 class="fw-bold mb-3 text-dark">Unlock the Best Study Materials</h4>
                        <p class="text-secondary mb-4" style="font-size: 1.1rem; line-height: 1.6;">
                            This document is a <strong>Past Paper / Assignment</strong> and is reserved for Premium Students. 
                            Upgrade your account today to access all past papers, assignments, and exclusive resources!
                        </p>
                        
                        <div class="d-grid gap-3">
                            <a href="#" class="btn btn-warning btn-lg fw-bold rounded-pill shadow-sm" style="font-family: 'Outfit', sans-serif; letter-spacing: 1px;">
                                <i class="bi bi-lightning-charge-fill me-2"></i>UPGRADE NOW
                            </a>
                            <a href="/dashboard" class="btn btn-light btn-lg fw-bold rounded-pill text-secondary">
                                Go Back
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
