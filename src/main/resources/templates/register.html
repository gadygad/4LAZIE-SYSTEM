<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - 4LAZIE Premium</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" th:href="@{/css/global-premium.css}">
</head>
<body>
    <div class="bg-glow">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="auth-container">
        <div class="premium-card">
            
            <div class="text-center mb-4 pb-2">
                <a href="/" class="text-decoration-none d-inline-block mb-1">
                    <span class="text-gradient fw-bold" style="font-size: 2.5rem; letter-spacing: -1.8px;">4LAZIE</span>
                </a>
                <h4 class="fw-bold mb-1 mt-2 text-dark-custom" style="letter-spacing: -0.5px;">Create Account</h4>
                <p class="text-muted-custom" style="font-size: 0.85rem; font-weight: 500;">Join the smart generation today</p>
            </div>

            <!-- Alerts -->
            <div th:if="${error}" class="alert d-flex align-items-center p-3 mb-4 rounded-4" style="background: rgba(225, 29, 72, 0.15); border: 1px solid rgba(225, 29, 72, 0.3); color: #9f1239; font-size: 0.85rem; backdrop-filter: blur(5px);">
                <i class="bi bi-exclamation-triangle-fill fs-5 me-3"></i> <span th:text="${error}"></span>
            </div>

            <form th:action="@{/register}" method="post" th:object="${user}">
                
                <div class="mb-3">
                    <select name="institution.id" class="premium-input form-select shadow-none" style="cursor: pointer;" required>
                        <option value="1" selected>St. Joseph College of Engineering (SJUIT)</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <input type="text" name="name" th:field="*{name}" class="premium-input shadow-none" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''" placeholder="Majina Yako Kamili (Mfano: John Doe)" required pattern="^[a-zA-Z\-']+(?:\s+[a-zA-Z\-']+)+$" title="Tafadhali andika majina kuanzia mawili (Mfano: John Doe)" autocomplete="off">
                    <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="invalid-feedback" style="font-size: 0.8rem; font-weight: 500; margin-top: 4px;"></div>
                </div>
                
                <div class="mb-3">
                    <input type="email" name="email" th:field="*{email}" class="premium-input shadow-none" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" placeholder="Email Address" required autocomplete="off">
                    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="invalid-feedback" style="font-size: 0.8rem; font-weight: 500; margin-top: 4px;"></div>
                </div>
                

                
                <div class="mb-4">
                    <input type="password" name="password" th:field="*{password}" class="premium-input shadow-none" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" placeholder="Password" required>
                    <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="invalid-feedback" style="font-size: 0.8rem; font-weight: 500; margin-top: 4px;"></div>
                </div>

                <button type="submit" class="premium-btn mb-4">
                    Sign Up Now
                </button>
            </form>

            <div class="d-flex align-items-center mb-4">
                <hr class="flex-grow-1" style="border-color: rgba(15,23,42,0.1); margin: 0;">
                <span class="mx-3" style="color: rgba(15,23,42,0.4); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">Or continue with</span>
                <hr class="flex-grow-1" style="border-color: rgba(15,23,42,0.1); margin: 0;">
            </div>

            <div class="d-flex justify-content-center mb-4">
                <div id="g_id_onload"
                     data-client_id="226739305071-2b7frq975mp822vaua8404aci2cej5ds.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-size="large"
                     data-theme="outline"
                     data-text="sign_up_with"
                     data-shape="rectangular"
                     data-logo_alignment="left">
                </div>
            </div>

            <!-- Hidden form to submit the token with CSRF protection -->
            <form id="google-login-form" th:action="@{/register/google}" method="post" style="display: none;">
                <input type="hidden" name="credential" id="google-credential">
            </form>

            <div class="text-center pt-2" style="border-top: 1px solid rgba(15,23,42,0.05);">
                <span class="text-muted-custom" style="font-size: 0.95rem;">Already registered?</span> 
                <a th:href="@{/login}" class="text-gradient fw-bold text-decoration-none ms-1" style="font-size: 0.95rem;">Sign In</a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        function handleCredentialResponse(response) {
            document.getElementById('google-credential').value = response.credential;
            document.getElementById('google-login-form').submit();
        }
    </script>
</body>
</html>
