<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable Archive - 4LAZIE</title>
    <!-- Google Fonts: Outfit & Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            background: #f8fafc; /* Premium White/Light Background */
            font-family: 'Outfit', sans-serif;
            color: #0f172a;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 1rem;
            position: relative;
        }

        /* Ambient Glow in the background */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 300px;
            background: radial-gradient(circle at 50% -50%, rgba(245, 158, 11, 0.15) 0%, rgba(248, 250, 252, 0) 70%);
            z-index: -1;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        /* Gold Glassmorphism Header */
        .header-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 16px;
            padding: 1.2rem 2rem;
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 40px rgba(245, 158, 11, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .header-glass:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(245, 158, 11, 0.15);
            border-color: rgba(245, 158, 11, 0.6);
        }

        .header-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #b45309, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

        .back-btn {
            color: #64748b;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(241, 245, 249, 0.6);
        }

        .back-btn:hover {
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
            transform: translateX(-3px);
        }

        /* Accordion (Dropdown style) */
        .premium-accordion {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: none;
            background: transparent;
            gap: 15px;
            display: flex;
            flex-direction: column;
        }

        .accordion-item {
            background: transparent;
            border: none;
            border-radius: 12px !important;
            overflow: hidden;
        }

        .accordion-button {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.6));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(245, 158, 11, 0.2) !important;
            border-radius: 12px !important;
            padding: 1.25rem 1.5rem;
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f172a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02) !important;
            transition: all 0.3s ease;
        }

        .accordion-button:not(.collapsed) {
            background: linear-gradient(135deg, #fef3c7, #fffbeb);
            color: #b45309;
            border-bottom-left-radius: 0 !important;
            border-bottom-right-radius: 0 !important;
            border-color: rgba(245, 158, 11, 0.4) !important;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.1) !important;
        }

        .accordion-button:hover {
            border-color: rgba(245, 158, 11, 0.5) !important;
            transform: translateY(-2px);
        }

        .accordion-button::after {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%23f59e0b'%3e%3cpath fill-rule='evenodd' d='M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z'/%3e%3c/svg%3e");
            transition: all 0.2s ease;
        }
        
        /* Make accordion open instantly without delay */
        .collapsing {
            transition: none !important;
        }

        .accordion-body {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-top: none;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            padding: 1.5rem;
        }

        /* Timetable Cards (Glassmorphism inside Dropdown) */
        .timetable-card {
            background: #ffffff;
            border: 1px solid rgba(226, 232, 240, 1);
            border-radius: 12px;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #0f172a;
            margin-bottom: 1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            position: relative;
            overflow: hidden;
        }

        .timetable-card:last-child {
            margin-bottom: 0;
        }

        /* The Magic Hover Effect */
        .timetable-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.02));
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }

        .timetable-card:hover {
            transform: translateX(10px) translateY(-3px);
            border-color: #f59e0b;
            box-shadow: 0 15px 30px rgba(245, 158, 11, 0.15);
        }

        .timetable-card:hover::before {
            opacity: 1;
        }

        .card-info {
            display: flex;
            align-items: center;
            gap: 18px;
            position: relative;
            z-index: 1;
        }

        .card-icon {
            background: #fef3c7;
            color: #d97706;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.2);
        }

        .timetable-card:hover .card-icon {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #ffffff;
            transform: rotate(15deg) scale(1.1);
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.4);
        }

        .card-details {
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 0;
            color: #1e293b;
            transition: color 0.3s ease;
        }

        .timetable-card:hover .card-title {
            color: #b45309;
        }

        .card-subtitle {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
            font-weight: 500;
        }

        .view-btn {
            font-size: 1.2rem;
            color: #cbd5e1;
            transition: all 0.4s ease;
            position: relative;
            z-index: 1;
            background: #f8fafc;
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .timetable-card:hover .view-btn {
            color: #ffffff;
            background: #f59e0b;
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: #64748b;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            border: 1px dashed rgba(245, 158, 11, 0.3);
            backdrop-filter: blur(10px);
        }

        .empty-icon {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            display: inline-block;
        }
        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .header-glass {
                padding: 1rem 1.2rem;
                margin-bottom: 2rem;
            }
            .header-title {
                font-size: 1.15rem; /* Smaller font to fit on one line */
            }
            .back-btn {
                font-size: 0.85rem;
                padding: 6px 12px;
            }
            .accordion-button {
                font-size: 1.1rem;
                padding: 1rem 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header-glass">
        <a href="#" style="text-decoration: none;"><h1 class="header-title">TIMETABLE ARCHIVE</h1></a>
        <a href="/" class="back-btn">
            <i class="bi bi-arrow-left"></i> <span>Back to Home</span>
        </a>
    </div>

    <!-- Check if past timetables exist -->
    <div th:if="${pastTimetables == null || pastTimetables.isEmpty()}" class="empty-state">
        <i class="bi bi-folder-x empty-icon"></i>
        <h4 class="fw-bold" style="color: #0f172a;">No Archives Found</h4>
        <p>There are no past timetables available in the archive yet.</p>
    </div>

    <!-- Grouped Timetables (Accordion Dropdown Magic) -->
    <div th:if="${pastTimetables != null && !pastTimetables.isEmpty()}" class="accordion premium-accordion" id="archiveAccordion">
        
        <div th:each="entry, iterStat : ${pastTimetables}" class="accordion-item">
            <h2 class="accordion-header" th:id="'heading' + ${iterStat.index}">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" 
                        th:data-bs-target="'#collapse' + ${iterStat.index}" aria-expanded="false" 
                        th:aria-controls="'collapse' + ${iterStat.index}">
                    <i class="bi bi-calendar3-range me-3" style="color: #f59e0b; font-size: 1.4rem;"></i>
                    <span style="letter-spacing: 1px;">ACADEMIC YEAR: <span th:text="${entry.key}" style="font-weight: 800;">2024/2025</span></span>
                </button>
            </h2>
            <div th:id="'collapse' + ${iterStat.index}" class="accordion-collapse collapse" 
                 th:aria-labelledby="'heading' + ${iterStat.index}" data-bs-parent="#archiveAccordion">
                <div class="accordion-body">
                    <!-- Timetable Items inside Dropdown -->
                    <a th:each="timetable : ${entry.value}" 
                       th:href="@{/timetable/view(program=${timetable.programType}, level=${timetable.levelNo}, semester=${timetable.semesterNo}, academicYear=${timetable.academicYear})}" 
                       class="timetable-card">
                        
                        <div class="card-info">
                            <div class="card-icon">
                                <i class="bi bi-file-earmark-pdf-fill"></i>
                            </div>
                            <div class="card-details">
                                <h3 class="card-title" th:text="${timetable.programType} + ' - Level ' + ${timetable.levelNo} + ' (Semester ' + ${timetable.semesterNo} + ')'">DIPLOMA - Level 5 (Semester 2)</h3>
                                <span class="card-subtitle">Click to view or download as PDF</span>
                            </div>
                        </div>

                        <div class="view-btn">
                            <i class="bi bi-arrow-right-short" style="font-size: 1.5rem;"></i>
                        </div>
                    </a>
                </div>
            </div>
        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
