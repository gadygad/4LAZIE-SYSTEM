<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPLOAD NOTES - Admin Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Font: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Premium Global CSS -->
    <link rel="stylesheet" th:href="@{/css/premium-theme.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">

    <style>
        
    </style>
</head>

<body>

    <!-- Header Navbar -->
    <nav class="navbar navbar-dark navbar-custom sticky-top py-1">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/dashboard">
                <span class="brand-font fs-3 fw-bold"><i class="bi bi-journal-text text-dark me-2"></i>4LAZIE <span style="background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">NOTES</span></span>
            </a>
            <div th:replace="~{fragments/navbar_actions :: actions}"></div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-4">
        
        <!-- Alerts -->
        <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${param.success}">Note uploaded successfully!</span>
            <button type="button" class="btn-close text-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${param.error}">Error during upload!</span>
            <button type="button" class="btn-close text-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row g-4">
            <!-- Left Column: Upload Form -->
            <div class="col-lg-8">
                <div class="section-card">
                    <div class="text-center mb-5">
                        <h1 class="display-4 fw-bold brand-font mb-2" style="background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">📤 UPLOAD NOTES</h1>
                        <p class="text-secondary">Publish new study materials, select the course level and semester, and upload files.</p>
                    </div>

                    <form action="/upload" method="post" enctype="multipart/form-data" class="d-flex flex-column gap-4" style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(245, 158, 11, 0.1);">
                        
                        <div>
                            <label for="title" class="form-label fw-bold small" style="color: #64748b; letter-spacing: 1px; text-transform: uppercase;">Title:</label>
                            <input type="text" name="title" id="title" class="form-control" style="border-radius: 12px; padding: 12px 15px; border: 1px solid #e2e8f0; font-size: 0.95rem; background: #f8fafc;" placeholder="e.g. Unit 1 Notes, CAT 1 2024..." required>
                        </div>

                        <div class="row g-3">
                            <div class="col-12 col-md-4">
                                <label for="programType" class="form-label fw-bold small" style="color: #64748b; letter-spacing: 1px; text-transform: uppercase;">Course Program:</label>
                                <select name="programType" id="programType" class="form-select" style="border-radius: 12px; padding: 12px 15px; border: 1px solid #e2e8f0; font-size: 0.95rem; background: #f8fafc; cursor: pointer;" required onchange="fetchModules()">
                                    <option value="" disabled selected>Select Course</option>
                                    <option th:each="course : ${courses}" th:value="${course.programType}" th:text="${course.name}"></option>
                                </select>
                            </div>
                            <div class="col-6 col-md-4">
                                <label for="levelNo" class="form-label fw-bold small" style="color: #64748b; letter-spacing: 1px; text-transform: uppercase;">Level:</label>
                                <select name="levelNo" id="levelNo" class="form-select" style="border-radius: 12px; padding: 12px 15px; border: 1px solid #e2e8f0; font-size: 0.95rem; background: #f8fafc; cursor: pointer;" required onchange="fetchModules()">
                                    <option value="4">Level 4</option>
                                    <option value="5" selected>Level 5</option>
                                    <option value="6">Level 6</option>
                                </select>
                            </div>
                            <div class="col-6 col-md-4">
                                <label for="semesterNo" class="form-label fw-bold small" style="color: #64748b; letter-spacing: 1px; text-transform: uppercase;">Semester:</label>
                                <select name="semesterNo" id="semesterNo" class="form-select" style="border-radius: 12px; padding: 12px 15px; border: 1px solid #e2e8f0; font-size: 0.95rem; background: #f8fafc; cursor: pointer;" required onchange="fetchModules()">
                                    <option value="1">Semester 1</option>
                                    <option value="2">Semester 2</option>
                                </select>
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-12">
                                <label for="moduleSelect" class="form-label fw-bold small" style="color: #64748b; letter-spacing: 1px; text-transform: uppercase;">Subject / Module:</label>
                                <select id="moduleSelect" class="form-select" style="border-radius: 12px; padding: 12px 15px; border: 1px solid #e2e8f0; font-size: 0.95rem; background: #f8fafc; cursor: pointer;" required onchange="updateHiddenModuleFields()">
                                    <option value="" disabled selected>Please select course, level & semester first</option>
                                </select>
                                <input type="hidden" name="moduleName" id="moduleName">
                                <input type="hidden" name="moduleCode" id="moduleCode">
                                <div id="moduleLoading" class="form-text" style="display: none; color: #f59e0b;"><i class="spinner-border spinner-border-sm me-1"></i> Loading modules...</div>
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-6">
                                <label for="category" class="form-label fw-bold small" style="color: #64748b; letter-spacing: 1px; text-transform: uppercase;">Category:</label>
                                <select name="category" id="category" class="form-select" style="border-radius: 12px; padding: 12px 15px; border: 1px solid #e2e8f0; font-size: 0.95rem; background: #f8fafc; cursor: pointer;" required onchange="toggleUnit()">
                                    <option value="Note">Note (Free)</option>
                                    <option value="Past Paper">Past Paper (CAT/UE)</option>
                                    <option value="Assignment">Assignment</option>
                                    <option value="Video Tutorial">Video Tutorial</option>
                                </select>
                            </div>
                            <div class="col-6" id="unitNumberDiv">
                                <label for="unitNumber" class="form-label fw-bold small" style="color: #64748b; letter-spacing: 1px; text-transform: uppercase;">Unit:</label>
                                <select name="unitNumber" id="unitNumber" class="form-select" style="border-radius: 12px; padding: 12px 15px; border: 1px solid #e2e8f0; font-size: 0.95rem; background: #f8fafc; cursor: pointer;">
                                    <option value="">-- None --</option>
                                    <option value="1">Unit 1</option>
                                    <option value="2">Unit 2</option>
                                    <option value="3">Unit 3</option>
                                    <option value="4">Unit 4</option>
                                    <option value="5">Unit 5</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label for="file" class="form-label fw-bold small" style="color: #64748b; letter-spacing: 1px; text-transform: uppercase;">File Attachment:</label>
                            <input type="file" name="file" id="file" class="form-control" style="border-radius: 12px; padding: 12px 15px; border: 1px dashed #f59e0b; background: rgba(245, 158, 11, 0.05); color: #0f172a; cursor: pointer;" accept=".pdf,.doc,.docx,.ppt,.pptx" required>
                        </div>

                        <div class="d-grid mt-3">
                            <button type="submit" class="btn text-white fw-bold py-3" style="border-radius: 12px; font-size: 1.1rem; background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); border: none; box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3); transition: all 0.3s ease;" onmouseover="this.style.transform='translateY(-2px)';" onmouseout="this.style.transform='none';">
                                <i class="bi bi-cloud-arrow-up-fill me-2"></i> UPLOAD NOW
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Right Column: Sidebar Navigation -->
            <div class="col-lg-4">
                <div class="sidebar-card">
                    <h4 class="brand-font fw-bold mb-4" style="font-size: 1.25rem;">
                        <i class="bi bi-folder-fill text-warning me-2"></i>Sidebar
                    </h4>
                    <div class="d-flex flex-column gap-1">
                        <a href="/dashboard" class="sidebar-nav-item">
                            <i class="bi bi-grid-fill"></i>Dashboard
                        </a>
                        <a href="/upload" class="sidebar-nav-item active" th:if="${user.role == 'ADMIN'}">
                            <i class="bi bi-cloud-arrow-up-fill text-primary"></i>UPLOAD NOTES
                        </a>
                        <a href="#" class="sidebar-nav-item" onclick="comingSoon(event, 'MY NOTES')">
                            <i class="bi bi-journal-bookmark-fill"></i>MY NOTES
                        </a>
                        <a href="#" class="sidebar-nav-item" onclick="comingSoon(event, 'Favorites')">
                            <i class="bi bi-star-fill"></i>Favorites
                        </a>
                        <a href="#" class="sidebar-nav-item" onclick="comingSoon(event, 'Profile')">
                            <i class="bi bi-person-fill"></i>Profile
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Include Footer -->
    <div style="border-top: 1px solid #e2e8f0; background: #ffffff;">
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function comingSoon(e, feature) {
            e.preventDefault();
            alert(feature + " feature is coming soon!");
        }

        function toggleUnit() {
            var category = document.getElementById('category').value;
            var unitDiv = document.getElementById('unitNumberDiv');
            if (category === 'Note') {
                unitDiv.style.display = 'block';
            } else {
                unitDiv.style.display = 'none';
                document.getElementById('unitNumber').value = '';
            }
        }
        toggleUnit(); // initial call

        // AJAX to fetch modules based on Program, Level, and Semester
        function fetchModules() {
            const programType = document.getElementById('programType').value;
            const levelNo = document.getElementById('levelNo').value;
            const semesterNo = document.getElementById('semesterNo').value;
            const moduleSelect = document.getElementById('moduleSelect');
            const loading = document.getElementById('moduleLoading');

            if (!programType) return; // Don't fetch if program isn't selected

            loading.style.display = 'block';
            moduleSelect.innerHTML = '<option value="" disabled selected>Loading...</option>';
            moduleSelect.disabled = true;

            fetch(`/api/subjects?programType=${programType}&levelNo=${levelNo}&semesterNo=${semesterNo}`)
                .then(response => response.json())
                .then(data => {
                    loading.style.display = 'none';
                    moduleSelect.disabled = false;
                    moduleSelect.innerHTML = '<option value="" disabled selected>Select Subject / Module</option>';
                    
                    if (data.length === 0) {
                        moduleSelect.innerHTML = '<option value="" disabled selected>No modules found</option>';
                        document.getElementById('moduleName').value = '';
                        document.getElementById('moduleCode').value = '';
                        return;
                    }

                    data.forEach(subject => {
                        const option = document.createElement('option');
                        option.value = subject.name; // Use name as value
                        option.setAttribute('data-code', subject.code || '');
                        option.textContent = subject.name + (subject.code ? ' (' + subject.code + ')' : '');
                        moduleSelect.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('Error fetching modules:', error);
                    loading.style.display = 'none';
                    moduleSelect.disabled = false;
                    moduleSelect.innerHTML = '<option value="" disabled selected>Error loading modules</option>';
                });
        }

        // Update hidden inputs before form submit
        function updateHiddenModuleFields() {
            const moduleSelect = document.getElementById('moduleSelect');
            if(moduleSelect.selectedIndex > 0) {
                const selectedOption = moduleSelect.options[moduleSelect.selectedIndex];
                document.getElementById('moduleName').value = selectedOption.value;
                document.getElementById('moduleCode').value = selectedOption.getAttribute('data-code');
            }
        }
        
        // Fetch initially if program is already selected
        if(document.getElementById('programType').value) {
            fetchModules();
        }
    </script>
</body>
</html>
