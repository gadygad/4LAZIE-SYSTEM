<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="nav(activePage)">
        <!-- FLOATING BOTTOM NAV BAR -->
        <div class="fixed-bottom custom-mobile-nav-wrapper d-flex justify-content-center d-lg-none"
            style="z-index: 1040; pointer-events: none;">
            <div class="custom-mobile-nav-inner d-flex align-items-center justify-content-around rounded-pill shadow-lg px-3 py-1"
                style="pointer-events: auto; border: 1px solid rgba(245, 158, 11, 0.2); gap: 5px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);">

                <!-- Calendar - always visible -->
                <a href="#"
                    class="bottom-nav-btn text-decoration-none d-flex flex-column align-items-center py-1 px-2 rounded-4 border border-transparent"
                    style="color: #64748b; width: 70px;" data-bs-toggle="modal" data-bs-target="#calendarModal">
                    <i class="bi bi-calendar-event-fill" style="font-size: 1.15rem; margin-bottom: 2px;"></i>
                    <span style="font-size: 0.6rem; font-weight: 700; font-family: 'Outfit', sans-serif;">CALENDAR</span>
                </a>

                <!-- CAT 1 -->
                <a th:if="${cat1Passed == null || !cat1Passed}" href="#"
                    class="bottom-nav-btn exam-nav-btn text-decoration-none d-flex flex-column align-items-center py-1 px-2 rounded-4 border border-transparent"
                    style="color: #64748b; width: 60px;" data-bs-toggle="modal" data-bs-target="#examModal"
                    data-exam-title="CAT 1"
                    th:data-sem1="${currentCalendar != null and currentCalendar.sem1Cat1Date != null ? currentCalendar.sem1Cat1Date : ''}"
                    th:data-sem2="${currentCalendar != null and currentCalendar.sem2Cat1Date != null ? currentCalendar.sem2Cat1Date : ''}">
                    <i class="bi bi-ui-checks" style="font-size: 1.15rem; margin-bottom: 2px;"></i>
                    <span style="font-size: 0.6rem; font-weight: 700; font-family: 'Outfit', sans-serif;">CAT 1</span>
                </a>

                <!-- CAT 2 -->
                <a th:if="${cat2Passed == null || !cat2Passed}" href="#"
                    class="bottom-nav-btn exam-nav-btn text-decoration-none d-flex flex-column align-items-center py-1 px-2 rounded-4 border border-transparent"
                    style="color: #64748b; width: 60px;" data-bs-toggle="modal" data-bs-target="#examModal"
                    data-exam-title="CAT 2"
                    th:data-sem1="${currentCalendar != null and currentCalendar.sem1Cat2Date != null ? currentCalendar.sem1Cat2Date : ''}"
                    th:data-sem2="${currentCalendar != null and currentCalendar.sem2Cat2Date != null ? currentCalendar.sem2Cat2Date : ''}">
                    <i class="bi bi-ui-checks-grid" style="font-size: 1.15rem; margin-bottom: 2px;"></i>
                    <span style="font-size: 0.6rem; font-weight: 700; font-family: 'Outfit', sans-serif;">CAT 2</span>
                </a>

                <!-- UE -->
                <a th:if="${uePassed == null || !uePassed}" href="#"
                    class="bottom-nav-btn exam-nav-btn text-decoration-none d-flex flex-column align-items-center py-1 px-2 rounded-4 border border-transparent"
                    style="color: #64748b; width: 60px;" data-bs-toggle="modal" data-bs-target="#examModal"
                    data-exam-title="UE"
                    th:data-sem1="${currentCalendar != null and currentCalendar.sem1UeDate != null ? currentCalendar.sem1UeDate : ''}"
                    th:data-sem2="${currentCalendar != null and currentCalendar.sem2UeDate != null ? currentCalendar.sem2UeDate : ''}">
                    <i class="bi bi-mortarboard-fill" style="font-size: 1.15rem; margin-bottom: 2px;"></i>
                    <span style="font-size: 0.6rem; font-weight: 700; font-family: 'Outfit', sans-serif;">UE</span>
                </a>

            </div>
        </div>

        <style>
            .custom-mobile-nav-wrapper {
                margin-bottom: 1rem;
            }
            @media (max-width: 768px) {
                .custom-mobile-nav-wrapper {
                    margin-bottom: 0 !important;
                }
                .custom-mobile-nav-inner {
                    width: 100% !important;
                    border-radius: 20px 20px 0 0 !important;
                    border-bottom: none !important;
                    border-left: none !important;
                    border-right: none !important;
                    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 8px) !important;
                    justify-content: space-evenly !important;
                }
                .bottom-nav-btn {
                    width: auto !important;
                    flex: 1;
                }
            }
            .bottom-nav-btn {
                position: relative;
                overflow: hidden;
                transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
                border: 1px solid transparent !important;
                z-index: 1;
                -webkit-tap-highlight-color: transparent;
            }
            .bottom-nav-btn::before {
                content: '';
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) scale(0);
                width: 120%;
                padding-bottom: 120%;
                background: radial-gradient(circle, rgba(245, 158, 11, 0.25) 0%, rgba(245, 158, 11, 0) 70%);
                border-radius: 50%;
                transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
                opacity: 0;
                z-index: -1;
            }
            .bottom-nav-btn:hover::before {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            .bottom-nav-btn:hover {
                background: rgba(245, 158, 11, 0.1) !important;
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                color: #d97706 !important;
                transform: translateY(-5px);
                box-shadow: 0 8px 20px rgba(245, 158, 11, 0.15);
                border: 1px solid rgba(245, 158, 11, 0.2) !important;
            }
            .bottom-nav-btn i {
                transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.3s, filter 0.3s;
            }
            .bottom-nav-btn:hover i {
                color: #d97706 !important;
                transform: translateY(-2px) scale(1.15);
                filter: drop-shadow(0 6px 8px rgba(245, 158, 11, 0.4));
            }
            .bottom-nav-btn:active {
                transform: scale(0.92) translateY(2px) !important;
                box-shadow: inset 0 2px 10px rgba(245, 158, 11, 0.2) !important;
                background: rgba(245, 158, 11, 0.2) !important;
                transition: all 0.1s cubic-bezier(0.4, 0.0, 0.2, 1) !important;
            }
            .bottom-nav-btn:active i {
                transform: scale(0.85) !important;
                filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.8)) !important;
                transition: all 0.1s ease !important;
            }
        </style>

        <script>
            document.querySelectorAll('.exam-nav-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var title = this.getAttribute('data-exam-title');
                    var sem1 = this.getAttribute('data-sem1');
                    var sem2 = this.getAttribute('data-sem2');
                    var fullTitle = title === 'UE' ? 'University Examinations (UE)' : title;
                    
                    var titleEl = document.getElementById('examModalTitle');
                    if(titleEl) titleEl.innerText = fullTitle;
                    
                    var sem1El = document.getElementById('examSem1Date');
                    if(sem1El) sem1El.innerText = sem1 ? sem1 : 'Not announced yet';
                    
                    var sem2El = document.getElementById('examSem2Date');
                    if(sem2El) sem2El.innerText = sem2 ? sem2 : 'Not announced yet';
                });
            });
        </script>

        <!-- Modals (Calendar & Exams) -->
        <div th:replace="~{fragments/sjuit_components :: calendar_modals}"></div>
    </div>
</body>
</html>
