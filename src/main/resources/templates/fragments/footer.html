                    &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span>

                        4LAZIE

                </div>
                
                <div class="d-flex align-items-center justify-content-center gap-2">
                    <span style="color: #94a3b8; font-weight: 500; display: flex; align-items: center; gap: 4px; font-size: 0.75rem;">
                        <i class="bi bi-code-slash d-none d-md-inline" style="color: #cbd5e1;"></i>
                        Developed by 
                        <a href="https://www.mindenlabs.com" target="_blank" class="text-decoration-none" style="color: #ffffff; font-weight: 800; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: linear-gradient(135deg, #f59e0b, #d97706); padding: 4px 12px; border-radius: 50px; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3); letter-spacing: 0.5px; display: inline-block;">
                            www.mindenlabs.com
                        </a>
                    </span>
                </div>
                
            </div>
        </div>
        
        <!-- COMING SOON MODAL (PREMIUM GOLD) -->
        <div class="modal fade" id="comingSoonModal" tabindex="-1" aria-hidden="true" style="backdrop-filter: blur(8px);">
            <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
                <div class="modal-content border-0" style="border-radius: 20px; background: linear-gradient(145deg, #1e293b, #0f172a); box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);">

                        <div class="position-relative" style="z-index: 1;">
                            <div class="mb-4" style="width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(217,119,6,0.1)); border: 1px solid rgba(245,158,11,0.3); display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 0 20px rgba(245,158,11,0.2);">
                                <!-- star removed -->
                            </div>
                            <h4 class="fw-bold mb-3" style="font-family: 'Outfit', sans-serif; color: #ffffff; letter-spacing: 0.5px;">Coming Soon!</h4>
                            <p style="color: #cbd5e1; font-size: 0.95rem; line-height: 1.6; font-weight: 400; margin-bottom: 24px;">
                                Student Registration is temporarily closed as we are crafting an incredible <span style="color: #f59e0b; font-weight: 600;">Student Dashboard</span>. Stay tuned!
                            </p>
                            <button type="button" class="btn w-100 fw-bold py-3" data-bs-dismiss="modal" style="background: linear-gradient(135deg, #f59e0b, #d97706); color: #ffffff; border: none; border-radius: 14px; font-family: 'Outfit', sans-serif; font-size: 0.95rem; letter-spacing: 0.5px; box-shadow: 0 4px 15px rgba(245,158,11,0.3); transition: transform 0.3s;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">
                                Got it, thanks!
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Web Push Notification Script -->
        <script>
            function urlB64ToUint8Array(base64String) {
                const padding = '='.repeat((4 - base64String.length % 4) % 4);
                const base64 = (base64String + padding)
                    .replace(/\-/g, '+')
                    .replace(/_/g, '/');
                const rawData = window.atob(base64);
                const outputArray = new Uint8Array(rawData.length);
                for (let i = 0; i < rawData.length; ++i) {
                    outputArray[i] = rawData.charCodeAt(i);
                }
                return outputArray;
            }

            if ('serviceWorker' in navigator && 'PushManager' in window) {
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('/sw.js').then(function(swReg) {
                        if (Notification.permission === 'default') {
                            // Delay 5 seconds so user has time to read the page before prompting
                            setTimeout(() => requestNotificationPermission(swReg), 5000);
                        } else if (Notification.permission === 'granted') {
                            requestNotificationPermission(swReg);
                        }
                    }).catch(function(error) {
                        console.error('Service Worker Registration Error:', error);
                    });
                });
            }

            function requestNotificationPermission(swReg) {
                const applicationServerPublicKey = 'BDuH4P48gNZvO1uSV5MNuNar6XLMV4iUUialZbwfpGNrFvNKIK3A0A9XmWgNEKaYk8p6vdWkV3uOhXznc-gld9Q';
                const applicationServerKey = urlB64ToUint8Array(applicationServerPublicKey);
                swReg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: applicationServerKey
                }).then(function(subscription) {
                    // Send subscription to backend
                    fetch('/api/notifications/subscribe', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(subscription)
                    });
                }).catch(function(err) {
                    console.log('Failed to subscribe the user for push: ', err);
                });
            }
        </script>
    </footer>

</body>
</html>
