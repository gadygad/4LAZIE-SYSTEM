<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

    <!-- ULTRA-COMPACT TEXT-ONLY FOOTER -->
    <footer th:fragment="footer" class="mt-auto" style="padding: 1.5rem 0;">
        <div class="container">
            <div class="d-flex flex-column flex-lg-row justify-content-between align-items-center">
                
                <!-- Left Side: Brand & Slogan -->
                <div class="d-flex flex-column flex-md-row align-items-center mb-3 mb-lg-0 text-center text-md-start">
                    <a href="/" class="text-decoration-none d-flex align-items-center me-md-4 mb-2 mb-md-0">
                        <span style="font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.2rem; color: #0f172a; letter-spacing: -0.5px;">4LAZIE</span>
                        <div class="ms-2 d-inline-flex align-items-center">
                            <span style="font-size: 0.55rem; font-family: 'Outfit', sans-serif; font-weight: 800; letter-spacing: 1px; color: #f59e0b;">SMART IN BRAIN</span>
                        </div>
                    </a>
                    <p class="mb-0" style="font-size: 0.8rem; color: #64748b; max-width: 500px; line-height: 1.5; font-weight: 400;">
                        We believe students shouldn't waste hours searching for study materials. Find what you need faster and spend more time learning.
                    </p>
                </div>

                <!-- Right Side: Links & Badge -->
                <div class="d-flex flex-wrap justify-content-center align-items-center gap-3 gap-md-4">
                    
                    <!-- Quick Links -->
                    <div class="d-flex align-items-center gap-3">
                        <a th:href="${user != null ? '/dashboard' : '/login'}" style="font-size: 0.8rem; font-weight: 500; color: #64748b; text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#64748b'">Materials</a>
                        <a href="#" style="font-size: 0.8rem; font-weight: 500; color: #64748b; text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#64748b'">Privacy</a>
                        <a href="#" style="font-size: 0.8rem; font-weight: 500; color: #64748b; text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#64748b'">Terms</a>
                    </div>
                    
                    <div class="d-none d-md-block" style="width: 1px; height: 16px; background: rgba(0,0,0,0.1);"></div>
                    
                    <!-- MindenLabs Words Only -->
                    <div class="d-inline-flex align-items-center mt-2 mt-md-0">
                        <span style="font-size: 0.75rem; color: #64748b; font-weight: 500; font-family: 'Inter', sans-serif;">
                            Developed by 
                            <a href="https://www.mindenlabs.com" target="_blank" style="color: #3b82f6; font-weight: 700; text-decoration: none; font-family: 'Outfit', sans-serif; letter-spacing: 0.5px; margin-left: 3px;">
                                MindenLabs
                            </a>
                        </span>
                    </div>

                </div>
                
            </div>
        </div>
    </footer>

</body>
</html>
