<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

    <!-- INTERNATIONAL PREMIUM MINIMALIST FOOTER -->
    <footer th:fragment="footer" style="margin-top: auto; width: 100%; border-top: 1px solid rgba(245, 158, 11, 0.15); background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); position: relative; z-index: 10;">
        <div class="container-fluid px-4 px-xl-5 py-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center text-center text-md-start" style="font-family: 'Outfit', sans-serif; font-size: 13px; letter-spacing: 0.5px;">
                
                <div style="color: #64748b; font-weight: 500; margin-bottom: 10px; margin-md-bottom: 0;">
                    &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> 
                    <span style="font-weight: 900; color: #0f172a; letter-spacing: 1px;">
                        4LAZIE <i class="bi bi-stars" style="color: #f59e0b; font-size: 0.8rem;"></i>
                    </span>
                    <span class="d-block d-md-inline mt-1 mt-md-0 ms-md-2" style="font-size: 0.8rem; opacity: 0.8;">All rights reserved.</span>
                </div>
                
                <div class="d-flex align-items-center justify-content-center gap-3 mt-2 mt-md-0">
                    <span style="color: #94a3b8; font-weight: 500; display: flex; align-items: center; gap: 8px;">
                        <i class="bi bi-code-slash" style="color: #cbd5e1;"></i>
                        Developed by 
                        <a href="https://www.mindenlabs.com" target="_blank" class="text-decoration-none" style="color: #d97706; font-weight: 800; transition: all 0.3s; background: rgba(245, 158, 11, 0.1); padding: 4px 12px; border-radius: 50px; border: 1px solid rgba(245, 158, 11, 0.2);" onmouseover="this.style.background='rgba(245, 158, 11, 0.2)'; this.style.transform='translateY(-2px)';" onmouseout="this.style.background='rgba(245, 158, 11, 0.1)'; this.style.transform='none';">
                            mindenlabs.com
                        </a>
                    </span>
                </div>
                
            </div>
        </div>
        
        <!-- COMING SOON MODAL (PREMIUM GOLD) -->
        <div class="modal fade" id="comingSoonModal" tabindex="-1" aria-hidden="true" style="backdrop-filter: blur(8px);">
            <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
                <div class="modal-content border-0" style="border-radius: 20px; background: linear-gradient(145deg, #1e293b, #0f172a); box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);">
                    <div class="modal-body p-4 p-md-5 text-center position-relative overflow-hidden">
                        <div style="position: absolute; top: -50px; left: 50%; transform: translateX(-50%); width: 200px; height: 200px; background: radial-gradient(circle, rgba(245, 158, 11, 0.2) 0%, transparent 70%); border-radius: 50%; z-index: 0;"></div>
                        
                        <div class="position-relative" style="z-index: 1;">
                            <div class="mb-4" style="width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(217,119,6,0.1)); border: 1px solid rgba(245,158,11,0.3); display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 0 20px rgba(245,158,11,0.2);">
                                <i class="bi bi-stars" style="font-size: 2rem; color: #f59e0b;"></i>
                            </div>
                            <h4 class="fw-bold mb-3" style="font-family: 'Outfit', sans-serif; color: #ffffff; letter-spacing: 0.5px;">Coming Soon!</h4>
                            <p style="color: #cbd5e1; font-size: 0.95rem; line-height: 1.6; font-weight: 400; margin-bottom: 24px;">
                                Student Registration is temporarily closed as we are crafting an incredible <span style="color: #f59e0b; font-weight: 600;">Student Dashboard</span>. Stay tuned!
                            </p>
                            <button type="button" class="btn w-100 fw-bold py-3" data-bs-dismiss="modal" style="background: linear-gradient(135deg, #f59e0b, #d97706); color: #ffffff; border: none; border-radius: 14px; font-family: 'Outfit', sans-serif; font-size: 0.95rem; letter-spacing: 0.5px; box-shadow: 0 4px 15px rgba(245,158,11,0.3); transition: transform 0.3s;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">
                                Got it, thanks!
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
