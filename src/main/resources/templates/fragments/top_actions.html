<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="actions" class="d-flex align-items-center" style="gap: 0.6rem;">
<!-- Actions (Notifications, Profile) -->
                
                    
<!-- Notification Button (Triggers Dropdown) -->
                    <div class="dropdown">
                        <a href="#" class="d-flex align-items-center justify-content-center text-decoration-none position-relative" data-bs-toggle="dropdown" aria-expanded="false" role="button" id="notificationDropdown"
                           style="width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #ffffff, #f8fafc); border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.08); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);"
                           onmouseover="this.style.boxShadow='0 8px 25px rgba(16, 185, 129, 0.3)'; this.style.transform='translateY(-3px)'; this.querySelector('i').style.color='#10b981';" 
                           onmouseout="this.style.boxShadow='0 4px 15px rgba(16, 185, 129, 0.08)'; this.style.transform='none'; this.querySelector('i').style.color='#10b981';">
                            <i class="bi bi-bell-fill" style="color: #10b981; font-size: 1.2rem; transition: color 0.3s;"></i>
                            <span th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}" th:text="${unreadNotificationCount}" class="position-absolute top-0 start-100 translate-middle badge rounded-pill" style="background-color: #10b981; color: white !important; font-size: 0.65rem; padding: 0.35em 0.5em; border: 2px solid #fff; transform: translate(-30%, 30%) !important; animation: pulse-orange 2s infinite;">
                                3
                            </span>
                        </a>
                        
                        <!-- Notification Dropdown Menu -->
                        <ul class="dropdown-menu dropdown-menu-end shadow-lg notification-dropdown border-0" aria-labelledby="notificationDropdown" style="border-radius: 16px; min-width: 280px; width: 300px; max-width: 85vw; padding: 0; margin-top: 12px; overflow: hidden; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px);">
                            <li class="dropdown-header d-flex justify-content-between align-items-center px-4 py-3 border-bottom" style="background: rgba(248, 250, 252, 0.95);">
                                <h6 class="mb-0 fw-bold" style="font-family: 'Outfit', sans-serif; font-size: 1.1rem; color: #1e293b !important;">Notifications</h6>
                                <span th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}" th:text="${unreadNotificationCount + ' New'}" class="badge rounded-pill px-2 py-1" style="background: linear-gradient(135deg, #10b981, #059669); color: white !important; font-size: 0.75rem; font-weight: 600; box-shadow: 0 2px 8px rgba(16,185,129,0.3);">3 New</span>
                            </li>
                            
                            <li class="p-0">
                                <div class="list-group list-group-flush" style="max-height: 350px; overflow-y: auto;">
                                    
                                    <div th:if="${notifications == null or #lists.isEmpty(notifications)}" class="text-center py-4">
                                        <i class="bi bi-bell-slash text-muted" style="font-size: 2rem;"></i>
                                        <p class="text-muted mt-2 mb-0" style="font-size: 0.85rem;">No notifications yet</p>
                                    </div>
                                    
                                    <!-- Notification Item -->
                                    <a th:each="notification : ${notifications}" href="#" class="list-group-item list-group-item-action py-3 px-4 border-bottom text-decoration-none notification-item" th:style="'transition: all 0.3s ease; background-color: ' + (${notification.read} ? 'transparent' : 'rgba(16, 185, 129, 0.05)') + '; position: relative; overflow: hidden;'" onmouseover="this.style.backgroundColor='rgba(16, 185, 129, 0.08)'; this.style.paddingLeft='1.8rem';" onmouseout="this.style.backgroundColor=this.getAttribute('data-read') === 'true' ? 'transparent' : 'rgba(16, 185, 129, 0.05)'; this.style.paddingLeft='1.5rem';" th:attr="data-read=${notification.read}">
                                        <div class="accent-bar" style="position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(to bottom, #10b981, #059669); transform: scaleY(0); transition: transform 0.3s ease; transform-origin: top;"></div>
                                        <div class="d-flex w-100 justify-content-between align-items-start">
                                            <div class="d-flex align-items-start">
                                                <div class="me-3 d-flex justify-content-center align-items-center mt-1" style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(5, 150, 105, 0.15)); box-shadow: 0 4px 10px rgba(16,185,129,0.1); flex-shrink: 0;">
                                                    <i class="bi bi-info-circle-fill" style="font-size: 1.1rem; color: #10b981;"></i>
                                                </div>
                                                <div>
                                                    <h6 class="mb-1 fw-bold" style="font-size: 0.9rem; color: #0f172a !important;" th:text="${notification.title}">System Update</h6>
                                                    <p class="mb-1" style="font-size: 0.8rem; line-height: 1.4; color: #475569 !important;" th:text="${notification.message}">Message</p>
                                                    <small class="fw-bold text-muted" style="font-size: 0.7rem;" th:text="${#temporals.format(notification.createdAt, 'dd MMM, HH:mm')}">2 hours ago</small>
                                                </div>
                                            </div>
                                        </div>
                                    </a>
                                </div>
                            </li>
                            <li class="text-center border-top">
                                <a href="#" class="dropdown-item py-2 fw-bold" style="font-size: 0.85rem; color: #10b981; transition: background-color 0.2s;" onmouseover="this.style.backgroundColor='rgba(16, 185, 129, 0.05)'" onmouseout="this.style.backgroundColor='transparent'">
                                    View All Activity
                                </a>
                            </li>
                        </ul>
                        
                        <style>
                            /* Smooth Dropdown Animation */
                            @keyframes customDropdownFadeIn {
                                from {
                                    opacity: 0;
                                    transform: translateY(15px);
                                }
                                to {
                                    opacity: 1;
                                    transform: translateY(0);
                                }
                            }
                            
                            .dropdown-menu.notification-dropdown.show {
                                animation: customDropdownFadeIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
                            }

                            .notification-item:hover .accent-bar {
                                transform: scaleY(1) !important;
                            }
                            
                            /* Staggered falling down animation */
                            @keyframes fallDownFade {
                                0% {
                                    opacity: 0;
                                    transform: translateY(-20px);
                                }
                                100% {
                                    opacity: 1;
                                    transform: translateY(0);
                                }
                            }
                            
                            /* Apply animation when dropdown is shown */
                            .dropdown-menu.show .notification-item {
                                animation: fallDownFade 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
                                opacity: 0; /* start hidden */
                            }
                            
                            .dropdown-menu.show .notification-item:nth-child(1) { animation-delay: 0.05s; }
                            .dropdown-menu.show .notification-item:nth-child(2) { animation-delay: 0.1s; }
                            .dropdown-menu.show .notification-item:nth-child(3) { animation-delay: 0.15s; }
                        </style>
                        <script>
                            document.addEventListener("DOMContentLoaded", function() {
                                const notifDropdown = document.getElementById('notificationDropdown');
                                if(notifDropdown) {
                                    notifDropdown.addEventListener('show.bs.dropdown', function () {
                                        const getCsrfToken = () => {
                                            const match = document.cookie.match(new RegExp('(^| )XSRF-TOKEN=([^;]+)'));
                                            return match ? match[2] : '';
                                        };
                                        fetch('/api/notifications/mark-read', {
                                            method: 'POST',
                                            headers: {
                                                'Content-Type': 'application/json',
                                                'X-XSRF-TOKEN': getCsrfToken()
                                            }
                                        }).then(() => {
                                            // Optionally remove badges or set them to 0 visually
                                            const badges = document.querySelectorAll('#notificationDropdown .badge, .notification-dropdown .badge');
                                            badges.forEach(b => b.style.display = 'none');
                                            const items = document.querySelectorAll('.notification-item');
                                            items.forEach(i => {
                                                i.style.backgroundColor = 'transparent';
                                            });
                                        }).catch(e => console.error(e));
                                    });
                                }
                            });
                        </script>
                    </div>


</div>
            </div>
