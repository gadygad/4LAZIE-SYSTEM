<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="actions" class="d-flex align-items-center">
        <!-- Global Search Bar -->
        <div class="search-container position-relative me-3 d-none d-md-block" style="width: 280px;">
            <form th:action="@{${session.user != null ? '/notes' : '/guest-notes'}}" method="get" class="m-0">
                <i class="bi bi-search position-absolute text-muted" style="left: 14px; top: 50%; transform: translateY(-50%); font-size: 0.9rem; z-index: 5;"></i>
                <input type="text" name="search" th:value="${searchQuery}" class="form-control position-relative" placeholder="Search notes, past papers..."
                       style="padding: 6px 16px 6px 40px; border-radius: 50px; border: 1px solid rgba(0,0,0,0.1); background: #f8fafc; font-size: 0.85rem; font-weight: 500; transition: all 0.3s ease; color: #1e293b;"
                       onfocus="this.style.boxShadow='0 0 0 4px rgba(16, 185, 129, 0.1)'; this.style.borderColor='rgba(16, 185, 129, 0.3)'; this.style.background='#ffffff';"
                       onblur="this.style.boxShadow='none'; this.style.borderColor='rgba(0,0,0,0.1)'; this.style.background='#f8fafc';">
            </form>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex align-items-center me-2 me-md-4">
            <!-- Premium Home & Notification Buttons -->
            <div class="d-flex align-items-center">
                
                <style>
                    /* Theme Variables for Notifications */
                    :root {
                        --noti-color: var(--noti-color);
                        --noti-color-dark: #d35400;
                        --noti-bg-light: rgba(230, 126, 34, 0.04);
                        --noti-bg-medium: rgba(230, 126, 34, 0.15);
                        --noti-bg-dark: rgba(211, 84, 0, 0.25);
                        --noti-shadow: var(--noti-border);
                        --noti-border: rgba(230, 126, 34, 0.4);
                    }
                </style>
                <style th:if="${session.user != null}">
                    /* Green Theme for Logged-In Users */
                    :root {
                        --noti-color: #10b981;
                        --noti-color-dark: #059669;
                        --noti-bg-light: rgba(16, 185, 129, 0.04);
                        --noti-bg-medium: rgba(16, 185, 129, 0.15);
                        --noti-bg-dark: rgba(5, 150, 105, 0.25);
                        --noti-shadow: rgba(16, 185, 129, 0.3);
                        --noti-border: rgba(16, 185, 129, 0.4);
                    }
                </style>
                <style>
                    @keyframes popupAnim {
                        0% { opacity: 0; transform: scale(0.9) translateY(-10px); }
                        100% { opacity: 1; transform: scale(1) translateY(0); }
                    }
                    @keyframes pulse-orange {
                        0% { box-shadow: 0 0 0 0 rgba(230, 126, 34, 0.7); }
                        70% { box-shadow: 0 0 0 8px rgba(230, 126, 34, 0); }
                        100% { box-shadow: 0 0 0 0 rgba(230, 126, 34, 0); }
                    }
                    @media (max-width: 576px) {
                        .dropdown-menu {
                            width: 280px !important;
                            min-width: unset !important;
                            transform-origin: top right !important;
                            box-shadow: 0 10px 30px rgba(0,0,0,0.15) !important;
                            border-radius: 16px !important;
                            margin-top: 10px !important;
                        }
                    }
                </style>
                <!-- Dark Mode Toggle Button -->
                <button id="darkModeToggleGlobal" class="d-none d-sm-flex align-items-center justify-content-center me-2 me-md-3 text-decoration-none position-relative dark-mode-toggle-btn" 
                   style="width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(248,250,252,0.85)); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 4px 15px rgba(0,0,0,0.08), inset 0 2px 5px rgba(255,255,255,1); backdrop-filter: blur(12px); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer;"
                   onmouseover="this.style.boxShadow='0 8px 25px rgba(100, 116, 139, 0.3), inset 0 2px 5px rgba(255,255,255,1)'; this.style.transform='translateY(-3px)';" 
                   onmouseout="this.style.boxShadow='0 4px 15px rgba(0,0,0,0.08), inset 0 2px 5px rgba(255,255,255,1)'; this.style.transform='none';">
                    <i class="bi bi-moon-stars-fill darkModeIcon" style="color: #64748b; font-size: 1.1rem; transition: color 0.3s, transform 0.5s;"></i>
                </button>

                <!-- Home Button -->
                <a href="/" class="d-none d-sm-flex align-items-center justify-content-center me-2 me-md-3 text-decoration-none position-relative" 
                   style="width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(248,250,252,0.85)); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 4px 15px rgba(0,0,0,0.08), inset 0 2px 5px rgba(255,255,255,1); backdrop-filter: blur(12px); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);"
                   onmouseover="this.style.boxShadow='0 8px 25px var(--noti-shadow), inset 0 2px 5px rgba(255,255,255,1)'; this.style.transform='translateY(-3px)'; this.style.borderColor='var(--noti-border)'; this.querySelector('i').style.color='var(--noti-color)';" 
                   onmouseout="this.style.boxShadow='0 4px 15px rgba(0,0,0,0.08), inset 0 2px 5px rgba(255,255,255,1)'; this.style.transform='none'; this.style.borderColor='rgba(255, 255, 255, 0.8)'; this.querySelector('i').style.color='#64748b';">
                    <i class="bi bi-house-door-fill" style="color: #64748b; font-size: 1.2rem; transition: color 0.3s;"></i>
                </a>

                <!-- Notification Button -->
                <div class="dropdown me-2 me-md-3">
                    <a href="#" class="d-flex align-items-center justify-content-center text-decoration-none position-relative" id="notificationDropdown" data-bs-toggle="dropdown" aria-expanded="false"
                       style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(248,250,252,0.85)); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 4px 15px rgba(0,0,0,0.08), inset 0 2px 5px rgba(255,255,255,1); backdrop-filter: blur(12px); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);"
                       onmouseover="this.style.boxShadow='0 8px 25px var(--noti-shadow), inset 0 2px 5px rgba(255,255,255,1)'; this.style.transform='translateY(-3px)'; this.style.borderColor='var(--noti-border)'; this.querySelector('i').style.color='var(--noti-color)';" 
                       onmouseout="this.style.boxShadow='0 4px 15px rgba(0,0,0,0.08), inset 0 2px 5px rgba(255,255,255,1)'; this.style.transform='none'; this.style.borderColor='rgba(255, 255, 255, 0.8)'; this.querySelector('i').style.color='#64748b';">
                        <i class="bi bi-bell-fill" style="color: #64748b; font-size: 1.1rem; transition: color 0.3s;"></i>
                    <!-- Notification Badge with Pulse -->
                    <span th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}" th:text="${unreadNotificationCount}" class="position-absolute top-0 start-100 translate-middle badge rounded-pill" style="background-color: var(--noti-color); font-size: 0.65rem; padding: 0.35em 0.5em; border: 2px solid #fff; transform: translate(-30%, 30%) !important; animation: pulse-orange 2s infinite;">
                        0
                    </span>
                </a>
                
                <!-- Notification Dropdown Menu -->
                <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg mt-3 p-0" aria-labelledby="notificationDropdown" style="border-radius: 20px; min-width: 320px; overflow: hidden; animation: popupAnim 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transform-origin: top right; border: 1px solid rgba(255,255,255,0.5);">
                    <li class="px-3 py-2 border-bottom d-flex justify-content-between align-items-center" style="background: rgba(248, 250, 252, 0.95); backdrop-filter: blur(10px);">
                        <span class="fw-bold text-dark" style="font-family: 'Outfit', sans-serif; font-size: 1rem;">Notifications</span>
                        <span th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}" th:text="${unreadNotificationCount + ' New'}" class="badge rounded-pill px-2 py-1 text-white" style="background: linear-gradient(135deg, var(--noti-color), var(--noti-color-dark)); font-weight: 600; box-shadow: 0 2px 8px var(--noti-shadow); font-size: 0.7rem;">0 New</span>
                    </li>
                    <li>
                        <div class="list-group list-group-flush" style="max-height: 350px; overflow-y: auto;">
                            <!-- Empty State -->
                            <th:block th:if="${notifications == null or #lists.isEmpty(notifications)}">
                                <div class="text-center py-4">
                                    <i class="bi bi-bell-slash text-muted" style="font-size: 2rem;"></i>
                                    <p class="text-muted mt-2 mb-0" style="font-size: 0.85rem;">No notifications yet</p>
                                </div>
                            </th:block>
                            
                            <!-- Dynamic Notifications -->
                            <th:block th:unless="${notifications == null or #lists.isEmpty(notifications)}">
                                <a th:each="notification : ${notifications}" href="#" class="list-group-item list-group-item-action py-3 px-4 border-bottom notification-item" th:style="'transition: background 0.2s; background: ' + (${notification.read} ? 'transparent' : 'var(--noti-bg-light)') + ';'" th:attr="data-read=${notification.read}">
                                    <div class="d-flex w-100 justify-content-between align-items-start">
                                        <div class="d-flex align-items-start">
                                            <div class="me-3 d-flex justify-content-center align-items-center mt-1" style="width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--noti-bg-medium), var(--noti-bg-dark)); box-shadow: 0 2px 10px var(--noti-shadow);">
                                                <i class="bi bi-info-circle-fill" style="font-size: 1.2rem; color: var(--noti-color);"></i>
                                            </div>
                                            <div>
                                                <h6 class="mb-1 fw-bold text-dark" style="font-size: 0.95rem;" th:text="${notification.title}">Title</h6>
                                                <p class="mb-1 text-muted" style="font-size: 0.85rem; line-height: 1.4;" th:text="${notification.message}">Message</p>
                                                <small class="fw-bold" style="font-size: 0.75rem; color: var(--noti-color);" th:text="${#temporals.format(notification.createdAt, 'dd MMM, HH:mm')}">Time</small>
                                            </div>
                                        </div>
                                        <div th:unless="${notification.read}" style="width: 10px; height: 10px; background: linear-gradient(135deg, #e67e22, #d35400); border-radius: 50%; margin-top: 6px; box-shadow: 0 0 8px rgba(230,126,34,0.5);"></div>
                                    </div>
                                </a>
                            </th:block>
                        </div>
                    </li>
                    <li class="text-center py-3 bg-light border-top">
                        <a href="#" class="text-decoration-none fw-bold" style="font-size: 0.9rem; color: var(--noti-color); transition: color 0.2s;" onmouseover="this.style.color='#d35400'" onmouseout="this.style.color='var(--noti-color)'">View All Notifications</a>
                    </li>
                </ul>
                </div>
            </div>
        </div>

        <!-- Profile Dropdown -->
        <div class="dropdown" th:if="${session.user != null}">
            <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false" 
               style="background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(255,255,255,0.6); padding: 5px 16px 5px 5px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.05), inset 0 2px 5px rgba(255,255,255,0.8); backdrop-filter: blur(8px); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);"
               onmouseover="this.style.boxShadow='0 8px 25px var(--noti-shadow), inset 0 2px 5px rgba(255,255,255,1)'; this.style.transform='translateY(-2px)'; this.style.borderColor='var(--noti-border)';" 
               onmouseout="this.style.boxShadow='0 4px 15px rgba(0,0,0,0.05), inset 0 2px 5px rgba(255,255,255,0.8)'; this.style.transform='none'; this.style.borderColor='rgba(255, 255, 255, 0.6)';">
                <img loading="lazy" th:if="${session.user != null and session.user.profilePicture != null}" th:src="${#strings.startsWith(session.user.profilePicture, 'http')} ? ${session.user.profilePicture} : @{'/uploads/' + ${session.user.profilePicture}}" alt="Profile" class="rounded-circle d-none d-sm-inline-block me-2" style="width: 40px; height: 40px; object-fit: cover; border: 2px solid #fff; box-shadow: 0 2px 10px var(--noti-shadow);">
                <img loading="lazy" th:unless="${session.user != null and session.user.profilePicture != null}" th:src="'https://ui-avatars.com/api/?name=' + ${session.user != null ? session.user.name : 'Student'} + '&background=10b981&color=fff'" alt="Profile" class="rounded-circle d-none d-sm-inline-block me-2" style="width: 40px; height: 40px; object-fit: cover; border: 2px solid #fff; box-shadow: 0 2px 10px rgba(16, 185, 129, 0.2);">
                <!-- Mobile-only avatar without margin -->
                <img loading="lazy" th:if="${session.user != null and session.user.profilePicture != null}" th:src="${#strings.startsWith(session.user.profilePicture, 'http')} ? ${session.user.profilePicture} : @{'/uploads/' + ${session.user.profilePicture}}" alt="Profile" class="rounded-circle d-sm-none" style="width: 40px; height: 40px; object-fit: cover; border: 2px solid #fff; box-shadow: 0 2px 10px var(--noti-shadow);">
                <img loading="lazy" th:unless="${session.user != null and session.user.profilePicture != null}" th:src="'https://ui-avatars.com/api/?name=' + ${session.user != null ? session.user.name : 'Student'} + '&background=10b981&color=fff'" alt="Profile" class="rounded-circle d-sm-none" style="width: 40px; height: 40px; object-fit: cover; border: 2px solid #fff; box-shadow: 0 2px 10px rgba(16, 185, 129, 0.2);">
                
                <div class="d-none d-sm-flex flex-column justify-content-center me-2">
                    <span class="fw-bold lh-1" style="font-family: 'Outfit', sans-serif; font-size: 0.9rem; color: #1e293b;" th:text="${session.user != null ? session.user.name : 'Student'}">John Doe</span>
                    <span class="lh-1 mt-1" style="font-size: 0.65rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--noti-color);">Premium</span>
                </div>
            </a>
            <ul class="dropdown-menu dropdown-menu-end border-0 mt-3 p-2" aria-labelledby="profileDropdown" style="border-radius: 24px; min-width: 260px; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 10px 40px rgba(16, 185, 129, 0.15), inset 0 2px 10px rgba(255,255,255,1); border: 1px solid rgba(255,255,255,0.7); animation: popupAnim 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transform-origin: top right;">
                <li class="px-4 py-3 mb-2" style="background: linear-gradient(135deg, rgba(16, 185, 129, 0.05), rgba(16, 185, 129, 0.15)); border-radius: 16px; position: relative; overflow: hidden;">
                    <div style="position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 60%); animation: rotateGlow 10s linear infinite;"></div>
                    <p class="mb-0 fw-bold text-dark position-relative" style="font-size: 1.05rem; font-family: 'Outfit', sans-serif; letter-spacing: -0.3px;" th:text="${session.user != null ? session.user.name : 'Student'}">John Doe</p>
                    <p class="mb-0 fw-bold position-relative" style="font-size: 0.7rem; color: #10b981; letter-spacing: 1px; text-transform: uppercase;" th:text="${session.user != null and session.user.courseProgram != null ? session.user.courseProgram : 'STUDENT'}">STUDENT</p>
                </li>
                
                <style>
                    @keyframes rotateGlow { 100% { transform: rotate(360deg); } }
                    .premium-dropdown-item {
                        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
                        border-radius: 14px;
                        margin-bottom: 4px;
                        display: flex;
                        align-items: center;
                    }
                    .premium-dropdown-item:hover {
                        background: linear-gradient(90deg, rgba(16, 185, 129, 0.2) 0%, rgba(16, 185, 129, 0.05) 100%) !important;
                        transform: translateX(8px);
                        color: #047857 !important;
                        font-weight: 700 !important;
                        border-left: 3px solid #10b981;
                    }
                    .premium-dropdown-item:hover .icon-box {
                        transform: scale(1.1);
                        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
                    }
                    .icon-box {
                        width: 36px; height: 36px;
                        border-radius: 10px;
                        display: flex; align-items: center; justify-content: center;
                        transition: all 0.3s ease;
                    }
                    .icon-box-green { background: rgba(16, 185, 129, 0.15); color: #10b981; }
                    .icon-box-red { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
                </style>

                <li th:if="${session.user != null and session.user.role == 'ADMIN'}">
                    <a class="dropdown-item py-2 px-3 fw-bold premium-dropdown-item text-secondary" href="/upload" style="font-size: 0.95rem;">
                        <div class="icon-box icon-box-green me-3"><i class="bi bi-speedometer2"></i></div>
                        Admin Dashboard
                    </a>
                </li>
                <li th:unless="${session.user != null and session.user.role == 'ADMIN'}">
                    <a class="dropdown-item py-2 px-3 fw-medium premium-dropdown-item text-secondary" href="/dashboard" style="font-size: 0.95rem;">
                        <div class="icon-box icon-box-green me-3"><i class="bi bi-grid-1x2-fill"></i></div>
                        Dashboard
                    </a>
                </li>
                <li>
                    <a class="dropdown-item py-2 px-3 fw-medium premium-dropdown-item text-secondary" href="/profile" style="font-size: 0.95rem;">
                        <div class="icon-box icon-box-green me-3"><i class="bi bi-person-fill"></i></div>
                        My Profile
                    </a>
                </li>
                <li>
                    <a class="dropdown-item py-2 px-3 fw-medium premium-dropdown-item text-secondary" href="#" style="font-size: 0.95rem;">
                        <div class="icon-box icon-box-green me-3"><i class="bi bi-gear-fill"></i></div>
                        Settings
                    </a>
                </li>
                <li><hr class="dropdown-divider my-2 opacity-25" style="border-color: rgba(16, 185, 129, 0.3);"></li>
                <li>
                    <a class="dropdown-item py-2 px-3 mb-1 fw-bold text-secondary" href="/logout" style="font-size: 0.95rem; border-radius: 14px; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; align-items: center;" onmouseover="this.style.background='linear-gradient(90deg, rgba(239, 68, 68, 0.15) 0%, rgba(239, 68, 68, 0.02) 100%)'; this.style.borderLeft='3px solid #ef4444'; this.style.transform='translateX(5px)'; this.style.color='#dc2626';" onmouseout="this.style.background='transparent'; this.style.borderLeft='none'; this.style.transform='none'; this.style.color='#6c757d';">
                        <div class="icon-box icon-box-red me-3"><i class="bi bi-box-arrow-right"></i></div>
                        Logout
                    </a>
                </li>
            </ul>
        </div>
        
        <div class="d-flex align-items-center gap-2" th:unless="${session.user != null}">
            <!-- Story Pill -->
            <a href="about.html" th:href="@{/about}" class="text-decoration-none d-flex align-items-center fw-bold" style="font-size: 0.85rem; color: #f59e0b; background: rgba(245, 158, 11, 0.1); padding: 6px 16px; border-radius: 50px; border: 1px solid rgba(245, 158, 11, 0.3); transition: all 0.3s ease;" onmouseover="this.style.background='rgba(245, 158, 11, 0.2)'; this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 12px rgba(245, 158, 11, 0.15)';" onmouseout="this.style.background='rgba(245, 158, 11, 0.1)'; this.style.transform='none'; this.style.boxShadow='none';">
                Story
            </a>
            <!-- Login Button -->
            <a th:href="@{/login}" class="btn text-white rounded-pill px-3 py-1 px-md-4 py-md-2 d-flex align-items-center gap-2" style="font-weight: 600; font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); border: none; box-shadow: 0 4px 15px var(--noti-border); transition: all 0.3s ease;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 20px rgba(230, 126, 34, 0.4)';" onmouseout="this.style.transform='none'; this.style.boxShadow='0 4px 15px var(--noti-border)';">
                <i class="bi bi-person-fill" style="font-size: 1rem;"></i> <span>Login</span>
            </a>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtns = document.querySelectorAll('.dark-mode-toggle-btn');
            const icons = document.querySelectorAll('.darkModeIcon');
            
            const currentTheme = localStorage.getItem('theme');
            if (currentTheme === 'dark') {
                document.body.classList.add('dark-mode');
                icons.forEach(i => {
                    i.classList.remove('bi-moon-stars-fill');
                    i.classList.add('bi-sun-fill');
                });
            }

            toggleBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.body.classList.toggle('dark-mode');
                    let theme = 'light';
                    if (document.body.classList.contains('dark-mode')) {
                        theme = 'dark';
                        icons.forEach(i => {
                            i.classList.remove('bi-moon-stars-fill');
                            i.classList.add('bi-sun-fill');
                        });
                    } else {
                        icons.forEach(i => {
                            i.classList.remove('bi-sun-fill');
                            i.classList.add('bi-moon-stars-fill');
                        });
                    }
                    localStorage.setItem('theme', theme);
                });
            });
        });
    </script>
