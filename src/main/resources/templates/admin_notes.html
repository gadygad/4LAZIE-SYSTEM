<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <!-- PWA Manifest & Theme Color -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="/images/logo.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Notes - Admin Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Font: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Premium Global CSS -->
    <link rel="stylesheet" th:href="@{/css/premium-theme.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/global-premium.css}">
</head>

<body>

    <!-- Premium Header Navbar -->
    <nav class="navbar sticky-top py-2" style="background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(16, 185, 129,0.15); box-shadow: 0 4px 20px rgba(0,0,0,0.03); z-index: 1040;">
        <div class="container d-flex justify-content-between align-items-center">
            <!-- Brand -->
            <a class="navbar-brand d-flex align-items-center text-decoration-none" th:href="${session.user != null ? '/dashboard' : '/'}">
                <div class="d-flex align-items-center justify-content-center me-2" style="width: 36px; height: 36px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 10px; box-shadow: 0 4px 10px rgba(16, 185, 129,0.3);">
                    <i class="bi bi-journal-bookmark-fill text-white" style="font-size: 1.1rem;"></i>
                </div>
                <div class="d-flex align-items-center" style="transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer;" onmouseover="this.style.transform='scale(1.03) translateY(-1px)';" onmouseout="this.style.transform='none';">
                    <span style="font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.8rem; color: #1e293b; letter-spacing: -1px; line-height: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.05);">4LAZIE</span>
                    <sup style="font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 0.65rem; color: #ffffff; background: linear-gradient(135deg, #10b981, #34d399); padding: 3px 8px; border-radius: 50px; margin-left: 6px; letter-spacing: 1.5px; box-shadow: 0 2px 8px rgba(16, 185, 129,0.3);">ADMIN</sup>
                </div>
            </a>
            <!-- User Menu -->
            <div class="d-flex align-items-center gap-3">
                <a href="/dashboard" class="btn btn-sm" style="background: rgba(16, 185, 129, 0.1); color: #10b981; border-radius: 10px; font-weight: 600; padding: 8px 16px; border: 1px solid rgba(16, 185, 129, 0.2); transition: all 0.3s;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 12px rgba(16,185,129,0.2)';" onmouseout="this.style.transform='none'; this.style.boxShadow='none';">
                    <i class="bi bi-grid-fill me-1"></i>DASHBOARD
                </a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Glassmorphism Toast Notification -->
        <div th:if="${success}" class="toast-notification" id="toastSuccess" style="position: fixed; top: 80px; right: 20px; z-index: 9999; min-width: 280px; max-width: 360px; padding: 12px 20px; border-radius: 14px; background: rgba(255,255,255,0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.25); box-shadow: 0 8px 32px rgba(16, 185, 129, 0.18); color: #065f46; font-weight: 600; font-size: 0.85rem; font-family: 'Outfit', sans-serif; display: flex; align-items: center; gap: 10px; animation: slideIn 0.4s cubic-bezier(0.34,1.56,0.64,1), fadeOut 0.5s ease 5s forwards;">
            <i class="bi bi-check-circle-fill" style="color: #10b981; font-size: 1.1rem;"></i>
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="toast-notification" id="toastError" style="position: fixed; top: 80px; right: 20px; z-index: 9999; min-width: 280px; max-width: 360px; padding: 12px 20px; border-radius: 14px; background: rgba(255,255,255,0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.25); box-shadow: 0 8px 32px rgba(16, 185, 129, 0.18); color: #065f46; font-weight: 600; font-size: 0.85rem; font-family: 'Outfit', sans-serif; display: flex; align-items: center; gap: 10px; animation: slideIn 0.4s cubic-bezier(0.34,1.56,0.64,1), fadeOut 0.5s ease 5s forwards;">
            <i class="bi bi-exclamation-triangle-fill" style="color: #dc2626; font-size: 1.1rem;"></i>
            <span th:text="${error}"></span>
        </div>
        <style>
            @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
            @keyframes fadeOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateY(-20px); } }
        </style>

        <div class="row g-4">
            <!-- Left Column: Notes Table -->
            <div class="col-lg-8">
                <div style="padding: 20px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 8px 32px rgba(16, 185, 129, 0.1); border-radius: 24px;">
                    
                    <div class="text-center mb-2">
                        <div class="mx-auto mb-1 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px; background: linear-gradient(135deg, rgba(16, 185, 129,0.15), rgba(5, 150, 105,0.05)); border-radius: 14px; box-shadow: 0 10px 25px rgba(16, 185, 129,0.2); backdrop-filter: blur(10px); border: 1px solid rgba(16, 185, 129,0.2);">
                            <i class="bi bi-journal-text" style="font-size: 1.5rem; color: #10b981;"></i>
                        </div>
                        <h1 class="fw-bolder mb-2" style="font-family: 'Outfit', sans-serif; font-size: 1.8rem; background: linear-gradient(135deg, #1e293b 0%, #334155 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase;">MANAGE NOTES</h1>
                    </div>

                    <!-- Search & Filter -->
                    <div class="mb-3">
                        <input type="text" id="searchNotes" class="form-control" placeholder="Search notes by title, module, or category..." style="border-radius: 12px; border: 1px solid rgba(16, 185, 129, 0.2); padding: 10px 16px; font-size: 0.9rem; transition: all 0.3s;" onfocus="this.style.borderColor='#10b981'; this.style.boxShadow='0 0 0 3px rgba(16,185,129,0.1)';" onblur="this.style.borderColor='rgba(16,185,129,0.2)'; this.style.boxShadow='none';">
                    </div>

                    <div class="table-responsive bg-white rounded-4 shadow-sm" style="border: 1px solid #f1f5f9;">
                        <table class="table table-hover align-middle mb-0" id="notesTable">
                            <thead style="background-color: #f8fafc;">
                                <tr>
                                    <th class="py-3 px-3 fw-semibold text-muted" style="border-bottom: 2px solid #e2e8f0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">TITLE</th>
                                    <th class="py-3 px-3 fw-semibold text-muted d-none d-md-table-cell" style="border-bottom: 2px solid #e2e8f0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">MODULE</th>
                                    <th class="py-3 px-3 fw-semibold text-muted" style="border-bottom: 2px solid #e2e8f0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">CATEGORY</th>
                                    <th class="py-3 px-3 fw-semibold text-muted d-none d-md-table-cell" style="border-bottom: 2px solid #e2e8f0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">DATE</th>
                                    <th class="py-3 px-3 fw-semibold text-muted text-center" style="border-bottom: 2px solid #e2e8f0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">ACTION</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="note : ${notes}" class="note-row" style="transition: all 0.3s ease;">
                                    <td class="py-3 px-3" style="font-weight: 600; color: #1e293b; font-size: 0.85rem;">
                                        <a th:href="@{'/view/' + ${note.encryptedSlug}}" class="text-decoration-none" style="color: #1e293b; transition: color 0.3s;" onmouseover="this.style.color='#10b981'" onmouseout="this.style.color='#1e293b'" th:text="${note.title}">Note Title</a>
                                    </td>
                                    <td class="py-3 px-3 d-none d-md-table-cell" style="color: #64748b; font-size: 0.8rem;" th:text="${note.moduleName}">Module</td>
                                    <td class="py-3 px-3">
                                        <span class="badge" style="background: rgba(16, 185, 129, 0.1); color: #059669; font-weight: 600; padding: 5px 10px; border-radius: 8px; font-size: 0.75rem;" th:text="${note.category}">Note</span>
                                    </td>
                                    <td class="py-3 px-3 d-none d-md-table-cell" style="color: #94a3b8; font-size: 0.8rem;" th:text="${note.uploadDate != null ? #temporals.format(note.uploadDate, 'dd MMM yyyy') : 'N/A'}">Date</td>
                                    <td class="py-3 px-3 text-center">
                                        <form th:action="@{'/admin/notes/' + ${note.id} + '/delete'}" method="post" onsubmit="return confirm('Are you sure you want to delete this note?');" style="display: inline;">
                                            <button type="submit" class="btn btn-sm" style="background: rgba(220, 38, 38, 0.08); color: #dc2626; border: 1px solid rgba(220, 38, 38, 0.15); border-radius: 10px; font-weight: 600; font-size: 0.75rem; padding: 5px 12px; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 12px rgba(220,38,38,0.2)'; this.style.background='rgba(220,38,38,0.15)';" onmouseout="this.style.transform='none'; this.style.boxShadow='none'; this.style.background='rgba(220,38,38,0.08)';">
                                                <i class="bi bi-trash3-fill me-1"></i>DELETE
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(notes)}">
                                    <td colspan="5" class="text-center py-5" style="color: #94a3b8;">
                                        <i class="bi bi-journal-x" style="font-size: 2rem; display: block; margin-bottom: 8px;"></i>
                                        No notes found.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="mt-3 text-center" style="color: #94a3b8; font-size: 0.8rem;">
                        Total: <strong th:text="${#lists.size(notes)}" style="color: #10b981;">0</strong> notes
                    </div>
                </div>
            </div>

            <!-- Right Column: Sidebar Navigation -->
            <div class="col-lg-4">
                <div class="sidebar-card position-sticky" style="top: 100px;">
                    <h4 class="brand-font fw-bold mb-2 sidebar-title" style="font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1.5px; padding-bottom: 0.6rem; border-bottom: 2px solid rgba(16, 185, 129, 0.3); cursor: default; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative;">
                        <i class="bi bi-folder-fill text-success me-2" style="transition: transform 0.3s ease;"></i>SIDEBAR
                    </h4>
                    <div class="d-flex flex-column gap-1">
                        <a href="/dashboard" class="sidebar-nav-item">
                            <i class="bi bi-grid-fill"></i>DASHBOARD
                        </a>
                        <a href="/admin/users" class="sidebar-nav-item" th:if="${session.user != null and session.user.role.name() == 'ADMIN'}">
                            <i class="bi bi-people-fill text-primary"></i>USERS MANAGEMENT
                        </a>
                        <a href="/upload" class="sidebar-nav-item" th:if="${session.user != null and session.user.role.name() == 'ADMIN'}">
                            <i class="bi bi-cloud-arrow-up-fill"></i>UPLOAD NOTES
                        </a>
                        <a href="/admin/notes" class="sidebar-nav-item active" th:if="${session.user != null and session.user.role.name() == 'ADMIN'}">
                            <i class="bi bi-journal-text text-primary"></i>MANAGE NOTES
                        </a>
                        <a href="/profile/downloads" class="sidebar-nav-item">
                            <i class="bi bi-journal-bookmark-fill"></i>MY NOTES
                        </a>
                        <a href="/profile/saved" class="sidebar-nav-item">
                            <i class="bi bi-star-fill"></i>FAVORITES
                        </a>
                        <a href="/profile" class="sidebar-nav-item">
                            <i class="bi bi-person-fill"></i>PROFILE
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Include Footer -->
    <div style="border-top: 1px solid #e2e8f0; background: #ffffff;">
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Search Filter Script -->
    <script>
        document.getElementById('searchNotes').addEventListener('input', function() {
            const query = this.value.toLowerCase();
            const rows = document.querySelectorAll('.note-row');
            rows.forEach(function(row) {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(query) ? '' : 'none';
            });
        });

        // Auto-remove toast notifications after 3 seconds
        document.querySelectorAll('.toast-notification').forEach(function(toast) {
            setTimeout(function() { toast.remove(); }, 5000);
        });
    </script>


    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('PWA ServiceWorker registered with scope:', registration.scope);
                    })
                    .catch(err => {
                        console.error('PWA ServiceWorker registration failed:', err);
                    });
            });
        }
    </script>

</body>
</html>
