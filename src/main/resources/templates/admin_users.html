<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Admin Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Font: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Premium Global CSS -->
    <link rel="stylesheet" th:href="@{/css/premium-theme.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/global-premium.css}">
</head>

<body>

    <!-- Premium Header Navbar -->
    <nav class="navbar sticky-top py-2" style="background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(16, 185, 129,0.15); box-shadow: 0 4px 20px rgba(0,0,0,0.03); z-index: 1040;">
        <div class="container d-flex justify-content-between align-items-center">
            <!-- Brand -->
            <a class="navbar-brand d-flex align-items-center text-decoration-none" th:href="${session.user != null ? '/dashboard' : '/'}">
                <div class="d-flex align-items-center justify-content-center me-2" style="width: 36px; height: 36px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 10px; box-shadow: 0 4px 10px rgba(16, 185, 129,0.3);">
                    <i class="bi bi-journal-bookmark-fill text-white" style="font-size: 1.1rem;"></i>
                </div>
                <div class="d-flex align-items-center" style="transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer;" onmouseover="this.style.transform='scale(1.03) translateY(-1px)';" onmouseout="this.style.transform='none';">
                    <span style="font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.8rem; color: #1e293b; letter-spacing: -1px; line-height: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.05);">4LAZIE</span>
                    <div class="ms-2 position-relative d-inline-flex align-items-center">
                        <span style="font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.8rem; letter-spacing: -0.5px; background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #059669 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0px 4px 15px rgba(16, 185, 129,0.4); position: relative; z-index: 2; padding-right: 2px;">ADMIN</span>
                    </div>
                </div>
            </a>
            
            <div th:replace="~{fragments/top_actions :: actions}"></div>
        </div>
        <div style="position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, rgba(16, 185, 129,0) 0%, rgba(16, 185, 129,0.8) 50%, rgba(16, 185, 129,0) 100%); box-shadow: 0 2px 10px rgba(16, 185, 129,0.5);"></div>
    </nav>

    <!-- Main Content -->
    <div class="container my-4">
        
        <!-- Glassmorphism Toast Notification -->
        <div th:if="${success}" class="toast-notification" style="position: fixed; top: 80px; right: 20px; z-index: 9999; min-width: 280px; max-width: 360px; padding: 12px 20px; border-radius: 14px; background: rgba(255,255,255,0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.25); box-shadow: 0 8px 32px rgba(16, 185, 129, 0.18); color: #065f46; font-weight: 600; font-size: 0.85rem; font-family: 'Outfit', sans-serif; display: flex; align-items: center; gap: 10px; animation: slideIn 0.4s cubic-bezier(0.34,1.56,0.64,1), fadeOut 0.5s ease 5s forwards;">
            <i class="bi bi-check-circle-fill" style="color: #10b981; font-size: 1.1rem;"></i>
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="toast-notification" style="position: fixed; top: 80px; right: 20px; z-index: 9999; min-width: 280px; max-width: 360px; padding: 12px 20px; border-radius: 14px; background: rgba(255,255,255,0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.25); box-shadow: 0 8px 32px rgba(16, 185, 129, 0.18); color: #065f46; font-weight: 600; font-size: 0.85rem; font-family: 'Outfit', sans-serif; display: flex; align-items: center; gap: 10px; animation: slideIn 0.4s cubic-bezier(0.34,1.56,0.64,1), fadeOut 0.5s ease 5s forwards;">
            <i class="bi bi-exclamation-triangle-fill" style="color: #dc2626; font-size: 1.1rem;"></i>
            <span th:text="${error}"></span>
        </div>
        <style>
            @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
            @keyframes fadeOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateY(-20px); } }
        </style>

        <div class="row g-4">
            <!-- Left Column: Users Table -->
            <div class="col-lg-8">
                <div style="padding: 20px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 8px 32px rgba(16, 185, 129, 0.1); border-radius: 24px;">
                    
                    <div class="text-center mb-2">
                        <div class="mx-auto mb-1 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px; background: linear-gradient(135deg, rgba(16, 185, 129,0.15), rgba(5, 150, 105,0.05)); border-radius: 14px; box-shadow: 0 10px 25px rgba(16, 185, 129,0.2); backdrop-filter: blur(10px); border: 1px solid rgba(16, 185, 129,0.2);">
                            <i class="bi bi-people-fill" style="font-size: 1.5rem; color: #10b981;"></i>
                        </div>
                        <h1 class="fw-bolder mb-2" style="font-family: 'Outfit', sans-serif; font-size: 1.8rem; background: linear-gradient(135deg, #1e293b 0%, #334155 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase;">Users Management</h1>
                        
                    </div>

                    <div class="table-responsive bg-white rounded-4 shadow-sm" style="border: 1px solid #f1f5f9;">
                        <table class="table table-hover align-middle mb-0">
                            <thead style="background-color: #f8fafc;">
                                <tr>
                                    <th class="py-3 px-4 fw-semibold text-muted" style="border-bottom: 2px solid #e2e8f0;">Name</th>
                                    <th class="py-3 px-4 fw-semibold text-muted" style="border-bottom: 2px solid #e2e8f0;">Email</th>
                                    <th class="py-3 px-4 fw-semibold text-muted" style="border-bottom: 2px solid #e2e8f0;">Role</th>
                                    <th class="py-3 px-4 fw-semibold text-muted text-end" style="border-bottom: 2px solid #e2e8f0;">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="u : ${users}">
                                    <td class="py-3 px-4 fw-bold" style="color: #1e293b;" th:text="${u.name}">John Doe</td>
                                    <td class="py-3 px-4 text-muted" th:text="${u.email}">john@example.com</td>
                                    <td class="py-3 px-4">
                                        <span class="badge rounded-pill" 
                                              th:text="${u.role.name()}"
                                              th:classappend="${u.role.name() == 'ADMIN' ? 'bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25' : 'bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25'}"
                                              style="font-size: 0.75rem; font-weight: 600; padding: 0.4em 0.8em;">STUDENT</span>
                                    </td>
                                    <td class="py-3 px-4 text-end">
                                        <!-- Actions Dropdown -->
                                        <div class="dropdown d-inline">
                                            <button class="btn btn-sm btn-light rounded-3" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="border: 1px solid #e2e8f0;">
                                                <i class="bi bi-three-dots-vertical"></i>
                                            </button>
                                            <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0" style="border-radius: 12px; min-width: 200px;">
                                                <li>
                                                    <form th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post" class="px-3 py-1">
                                                        <select name="role" class="form-select form-select-sm mb-2" onchange="this.form.submit()">
                                                            <option value="STUDENT" th:selected="${u.role.name() == 'STUDENT'}">Set as Student</option>
                                                            <option value="ADMIN" th:selected="${u.role.name() == 'ADMIN'}">Set as Admin</option>
                                                        </select>
                                                    </form>
                                                </li>
                                                <li><hr class="dropdown-divider"></li>
                                                <li>
                                                    <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" onsubmit="return confirm('Are you sure you want to delete this user?');">
                                                        <button type="submit" class="dropdown-item text-danger d-flex align-items-center">
                                                            <i class="bi bi-trash-fill me-2"></i> Delete User
                                                        </button>
                                                    </form>
                                                </li>
                                            </ul>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right Column: Sidebar Navigation -->
            <div class="col-lg-4">
                <div class="sidebar-card position-sticky" style="top: 100px;">
                    <h4 class="brand-font fw-bold mb-2 sidebar-title" style="font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1.5px; padding-bottom: 0.6rem; border-bottom: 2px solid rgba(16, 185, 129, 0.3); cursor: default; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative;">
                        <i class="bi bi-folder-fill text-success me-2" style="transition: transform 0.3s ease;"></i>SIDEBAR
                    </h4>
                    <div class="d-flex flex-column gap-1">
                        <a href="/dashboard" class="sidebar-nav-item">
                            <i class="bi bi-grid-fill"></i>DASHBOARD
                        </a>
                        <a href="/admin/users" class="sidebar-nav-item active" th:if="${session.user != null and session.user.role.name() == 'ADMIN'}">
                            <i class="bi bi-people-fill text-primary"></i>USERS MANAGEMENT
                        </a>
                        <a href="/upload" class="sidebar-nav-item" th:if="${session.user != null and session.user.role.name() == 'ADMIN'}">
                            <i class="bi bi-cloud-arrow-up-fill"></i>UPLOAD NOTES
                        </a>
                        <a href="/admin/notes" class="sidebar-nav-item" th:if="${session.user != null and session.user.role.name() == 'ADMIN'}">
                            <i class="bi bi-journal-text"></i>MANAGE NOTES
                        </a>
                        <a href="/profile/downloads" class="sidebar-nav-item">
                            <i class="bi bi-journal-bookmark-fill"></i>MY NOTES
                        </a>
                        <a href="/profile/saved" class="sidebar-nav-item">
                            <i class="bi bi-star-fill"></i>FAVORITES
                        </a>
                        <a href="/profile" class="sidebar-nav-item">
                            <i class="bi bi-person-fill"></i>PROFILE
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Include Footer -->
    <div style="border-top: 1px solid #e2e8f0; background: #ffffff;">
        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.toast-notification').forEach(function(toast) {
            setTimeout(function() { toast.remove(); }, 5000);
        });
    </script>
</body>
</html>
