<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <!-- PWA Manifest & Theme Color -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="/images/logo.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - 4LAZIE'">My Notes</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global-premium.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard-premium.css?v=5}">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
        }
        .header-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            padding: 3rem 1.5rem;
            border-radius: 0 0 2rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .note-card {
            background: white;
            border-radius: 1rem;
            border: 1px solid rgba(15,23,42,0.05);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            height: 100%;
        }
        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.06);
            border-color: rgba(16,185,129,0.2);
        }
        
        /* Mobile Optimizations */
        @media (max-width: 576px) {
            .header-card {
                padding: 2rem 1rem;
                border-radius: 0 0 1.5rem 1.5rem;
            }
            .header-card h1 {
                font-size: 1.8rem;
            }
            .note-card {
                padding: 1.5rem !important;
            }
            .note-card h5 {
                font-size: 1rem !important;
            }
        }
    </style>
</head>
<body class="has-bottom-nav">

    <!-- Back Navigation -->
    <div class="container mt-3">
        <a href="/profile" class="text-decoration-none text-secondary d-inline-flex align-items-center gap-2 fw-semibold" style="transition: color 0.3s;">
            Back to Profile
        </a>
    </div>

    <!-- Header -->
    <div class="header-card text-center">
        <i class="bi fs-1 mb-2" th:classappend="${pageIcon}" style="color: #10b981;"></i>
        <h1 class="fw-bold mb-0" th:text="${pageTitle}">My Notes</h1>
        <p class="text-white-50 mt-2" th:text="'You have ' + ${notes.size()} + ' notes here.'">0 notes</p>
    </div>

    <!-- Notes Container -->
    <div class="container mb-5 pb-5">
        <div th:if="${notes.empty}" class="text-center py-5">
            <i class="bi bi-folder-x fs-1 text-muted mb-3 d-block"></i>
            <h5 class="fw-bold text-dark">No Notes Found</h5>
            <p class="text-muted">It looks like this list is empty. Go explore some notes!</p>
            <a href="/dashboard" class="btn btn-success rounded-pill px-4 py-2 fw-bold mt-2" style="background: #10b981; border: none;">Browse Notes</a>
        </div>

        <div class="row g-4" th:if="${!notes.empty}">
            <div class="col-12 col-md-6 col-lg-4" th:each="note : ${notes}">
                <div class="note-card p-4 d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="d-flex align-items-center gap-2">
                            <div style="width: 40px; height: 40px; border-radius: 10px; background: rgba(16,185,129,0.1); display:flex; align-items:center; justify-content:center; color:#10b981;">
                                <i class="bi bi-file-earmark-pdf-fill fs-5"></i>
                            </div>
                            <div>
                                <span class="badge bg-light text-dark border fw-bold" th:text="${note.programType}">Prog</span>
                                <small class="text-muted d-block mt-1" style="font-size:0.75rem;" th:text="${#temporals.format(note.uploadDate, 'dd MMM yyyy')}">Date</small>
                            </div>
                        </div>
                    </div>
                    
                    <h5 class="fw-bold mb-2" style="color: #1e293b; font-size: 1.1rem; line-height: 1.4;" th:text="${note.title}">Note Title</h5>
                    <p class="text-muted mb-3" style="font-size: 0.85rem;" th:text="${note.moduleName}">Module Name</p>
                    
                    <div class="mt-auto pt-3 border-top">
                        <a th:href="@{'/view/' + ${note.slug}}" class="btn w-100 rounded-pill fw-bold text-white" style="background: linear-gradient(135deg, #10b981, #059669); transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='none'">
                            View Document
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- Mobile Bottom Navigation -->
    <div th:replace="~{fragments/bottom_nav :: nav('notes')}"></div>


    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('PWA ServiceWorker registered with scope:', registration.scope);
                    })
                    .catch(err => {
                        console.error('PWA ServiceWorker registration failed:', err);
                    });
            });
        }
    </script>

</body>
</html>
